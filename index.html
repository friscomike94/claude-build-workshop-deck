<title>Claude Code 결과물의 진짜 구조 이해하기</title>

<style>
:root{--bg:#0d0f12;--bg2:#14171c;--surface:#181c22;--surface2:#1f242b;--ink:#f2f4f6;--ink2:#c4cad2;--muted:#8b929c;--line:#2a2f37;--line2:#3a414b;--accent:#7cc4ff;--term:#0a0c0f;--good:#8fe08a;--warn:#ffc266;--font:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:var(--font);line-height:1.6}
h1,h2,h3,h4{margin:0;line-height:1.15;font-weight:800}p{margin:0;color:var(--ink2)}
.slide{min-height:100vh;padding:46px clamp(22px,4vw,60px) 100px;display:none;align-items:center}.slide.active{display:flex}.frame{width:min(1200px,100%);margin:0 auto}
.kicker{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line2);background:var(--surface);border-radius:999px;padding:7px 13px;color:var(--ink2);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.kicker:before{content:'';width:7px;height:7px;border-radius:99px;background:var(--accent)}
.cover h1{font-size:clamp(38px,6vw,74px);margin-top:22px;letter-spacing:-.03em}.cover .sub{font-size:clamp(17px,2vw,23px);margin-top:20px;color:var(--ink2);max-width:820px}.thesis{margin-top:28px;border-left:3px solid var(--accent);background:var(--surface);border-radius:0 14px 14px 0;padding:18px 22px;font-size:clamp(16px,1.7vw,20px);color:var(--ink);max-width:880px}
.title{font-size:clamp(28px,4vw,50px);margin:14px 0 22px;letter-spacing:-.02em}
.grid{display:grid;gap:16px}.cols2{grid-template-columns:1fr 1fr}
.card{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:22px}.card h3{font-size:20px;margin-bottom:12px}
.tag{display:inline-flex;border:1px solid var(--line2);background:var(--surface2);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:14px}
.tag.method{color:var(--accent);border-color:var(--accent)}
.bullets{display:grid;gap:12px}.bullet{display:grid;grid-template-columns:20px 1fr;gap:12px;font-size:17px;color:var(--ink2)}.bullet:before{content:'';margin-top:10px;width:7px;height:7px;border-radius:2px;background:var(--accent)}
.steps{counter-reset:it;display:grid;gap:10px}.step{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--surface)}.step:before{counter-increment:it;content:counter(it);width:26px;height:26px;border-radius:7px;background:var(--surface2);border:1px solid var(--line2);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:14px}
.tree{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}.trow{display:grid;grid-template-columns:minmax(190px,42%) 1fr;gap:0;border-bottom:1px solid var(--line)}.trow:last-child{border-bottom:none}.tpath{padding:12px 14px;font-family:'SFMono-Regular','Menlo',monospace;font-size:13.5px;color:var(--accent);background:var(--surface2);word-break:break-all}.trole{padding:12px 14px;color:var(--ink2);font-size:14.5px}
.cmd{border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:var(--term)}.cmd-head{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--surface);font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}.cmd.terminal .cmd-head{color:var(--good)}.cmd.claude .cmd-head{color:var(--accent)}.cmd-lbl{color:var(--muted)}
pre{margin:0;padding:16px 18px;white-space:pre-wrap;word-break:keep-all;color:var(--ink2);font-family:'SFMono-Regular','Menlo',monospace;font-size:14.5px;line-height:1.6}
.note{margin-top:10px;color:var(--muted);font-size:14px}
.lesson{border:1px solid var(--accent);background:rgba(124,196,255,.07);border-radius:16px;padding:22px}.lesson h3{color:var(--accent);font-size:16px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}.lesson p{font-size:20px;color:var(--ink)}
.small{font-size:13.5px;color:var(--muted)}.pipe{display:grid;gap:8px}.pipe .p{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:var(--surface);color:var(--ink2);font-size:15px}
.nav{position:fixed;z-index:10;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;border:1px solid var(--line2);background:rgba(13,15,18,.9);backdrop-filter:blur(12px);border-radius:999px;padding:9px}.nav button{border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:999px;padding:9px 15px;font-weight:700;cursor:pointer}.nav .primary{background:var(--accent);color:#08222f;border-color:var(--accent)}.counter{color:var(--muted);font-size:13px;min-width:66px;text-align:center}
a{color:var(--accent)}
@media(max-width:900px){.cols2{grid-template-columns:1fr}.trow{grid-template-columns:1fr}.cover h1{font-size:36px}.title{font-size:30px}pre{font-size:13px}}
@media print{body{background:#fff;color:#111}.slide{display:flex;min-height:auto;page-break-after:always}.nav{display:none}.card,.tree,.cmd,.step,.lesson,.pipe .p{background:#fff;color:#111;border-color:#ccc}}
</style>
</head>

<script>
var DATA = JSON.parse(document.getElementById('fallback-data').textContent);
var slides=[]; var current=0;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slide(html){var s=document.createElement('section');s.className='slide';s.innerHTML='<div class="frame">'+html+'</div>';slides.push(s);document.getElementById('deck').appendChild(s);}
function bullets(arr){return '<div class="bullets">'+(arr||[]).map(function(x){return '<div class="bullet">'+esc(x)+'</div>';}).join('')+'</div>';}
function tree(arr){return '<div class="tree">'+(arr||[]).map(function(x){return '<div class="trow"><div class="tpath">'+esc(x.path)+'</div><div class="trole">'+esc(x.role)+'</div></div>';}).join('')+'</div>';}
function pipe(arr){return '<div class="pipe">'+(arr||[]).map(function(x){return '<div class="p">'+esc(x)+'</div>';}).join('')+'</div>';}
function cmd(b){var t=b.type||'claude';var lbl=t==='terminal'?'TERMINAL':'CLAUDE CODE INPUT';return '<div class="cmd '+esc(t)+'"><div class="cmd-head"><span>'+esc(lbl)+'</span><span class="cmd-lbl">'+esc(b.label||'')+'</span></div><pre>'+esc(b.code||'')+'</pre></div>'+(b.say?'<p class="note">'+esc(b.say)+'</p>':'');}
function render(){var m=DATA.meta;var p=DATA.projects;document.getElementById('deck').innerHTML='';slides=[];
slide('<div class="cover"><span class="kicker">Claude Code Workshop</span><h1>'+esc(m.title)+'</h1><p class="sub">'+esc(m.subtitle)+'</p><div class="thesis">'+esc(m.thesis)+'</div></div>');
(DATA.coreConcepts||[]).forEach(function(c){slide('<span class="kicker">핵심 개념</span><h2 class="title">'+esc(c.title)+'</h2><div class="card">'+bullets(c.points)+'</div>');});
p.forEach(function(x,i){var n=String(i+1).padStart(2,'0');
slide('<span class="kicker">CASE '+n+' · '+esc(x.kind)+'</span><h2 class="title">'+esc(x.title)+'</h2><div class="grid cols2"><div class="card"><span class="tag method">'+esc(x.buildMethod)+'</span><p style="font-size:19px;color:var(--ink)">'+esc(x.oneLine)+'</p><p class="small" style="margin-top:14px">'+esc(x.repo)+(x.liveUrl?' · <a href="'+esc(x.liveUrl)+'" target="_blank">Live</a>':'')+'</p></div><div class="lesson"><h3>이 케이스의 핵심</h3><p>'+esc(x.keyLesson)+'</p></div></div>');
slide('<span class="kicker">CASE '+n+' · 실제 구조</span><h2 class="title">'+esc(x.title)+'는 이렇게 생겼다</h2>'+tree(x.realStructure));
slide('<span class="kicker">CASE '+n+' · 어떻게 만들어졌나</span><h2 class="title">제작 흐름 · '+esc(x.buildMethod)+'</h2>'+pipe(x.pipeline));
var rep=x.reproduce||[];slide('<span class="kicker">CASE '+n+' · 재현법</span><h2 class="title">새 컴퓨터에서 재현하기</h2><div class="grid cols2"><div>'+cmd(rep[0]||{})+(rep[1]?cmd(rep[1]):'')+'</div><div>'+(rep[2]?cmd(rep[2]):'')+'<div class="card" style="margin-top:14px"><h3>포인트</h3><p>'+esc(x.keyLesson)+'</p></div></div></div>');
});
var rg=DATA.reproduceGuide;slide('<span class="kicker">재현 순서</span><h2 class="title">'+esc(rg.title)+'</h2><div class="grid cols2"><div>'+(rg.steps||[]).slice(0,2).map(cmd).join('')+'</div><div>'+(rg.steps||[]).slice(2).map(cmd).join('')+'</div></div>');
slide('<span class="kicker">마무리</span><h2 class="title">결과물이 아니라 <span style="color:var(--accent)">구조</span>를 가져가야 재현된다</h2><div class="grid cols2"><div class="lesson"><h3>한 줄 결론</h3><p>'+esc(m.thesis)+'</p></div><div class="card">'+bullets(['프롬프트가 아니라 .claude 폴더(하네스·스킬)를 가져간다','복잡한 산출물은 멀티에이전트 파이프라인으로 만든다','까다로운 자동화는 시행착오를 스킬로 박제한다','단발성은 단일 파일로 끝내고, 반복되면 스킬로 승격한다'])+'</div></div>');
show(0);}
function show(i){current=Math.max(0,Math.min(i,slides.length-1));slides.forEach(function(s,k){s.classList.toggle('active',k===current);});document.getElementById('count').textContent=(current+1)+' / '+slides.length;location.hash='s'+(current+1);}
document.getElementById('prev').onclick=function(){show(current-1)};document.getElementById('next').onclick=function(){show(current+1)};
window.onkeydown=function(e){if(e.key==='ArrowRight'||e.key===' '){show(current+1)}if(e.key==='ArrowLeft'){show(current-1)}};
function start(){var mm=location.hash.match(/s(\d+)/);render();if(mm){show(Number(mm[1])-1)}}
if(location.protocol==='file:'){start();}else{fetch('data/projects.json').then(function(r){return r.ok?r.json():DATA}).then(function(j){DATA=j;start();}).catch(start)}
</script>
