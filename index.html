:root{--bg-0:#0b0b0d;--bg-1:#141417;--surface:rgba(255,255,255,.035);--surface-2:rgba(255,255,255,.06);--ink:#f4f4f2;--ink-2:#d9d9d4;--muted:rgba(230,230,225,.58);--line:rgba(255,255,255,.1);--line-strong:rgba(255,255,255,.18);--lime:#c8fa46;--lime-2:#a6e800;--lime-soft:rgba(200,250,70,.12);--lime-line:rgba(200,250,70,.4);--terminal:#08090a;--heading:'Gilroy','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--body:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% -4%,rgba(200,250,70,.06),transparent 42%),linear-gradient(180deg,var(--bg-0),var(--bg-1));color:var(--ink);font-family:var(--body);letter-spacing:-.025em}body:before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(210,255,60,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(210,255,60,.045) 1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.62),transparent 88%)}h1,h2,h3{font-family:var(--heading);letter-spacing:-.055em;line-height:1.05;margin:0}p{line-height:1.65;color:var(--ink-2)}a{color:var(--lime)}.slide{position:relative;z-index:1;min-height:100vh;padding:48px clamp(22px,4vw,64px) 105px;display:none;align-items:center}.slide.active{display:flex}.frame{width:min(1220px,100%);margin:0 auto}.kicker{display:inline-flex;gap:10px;align-items:center;border:1px solid var(--lime-line);background:var(--lime-soft);border-radius:999px;padding:8px 14px;color:var(--ink-2);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.kicker:before{content:'';width:8px;height:8px;border-radius:99px;background:var(--lime);box-shadow:0 0 14px var(--lime)}.hero h1{font-size:clamp(44px,7vw,88px);max-width:1040px;margin-top:24px}.hero em,.lime{font-style:normal;background:linear-gradient(100deg,var(--lime),var(--lime-2));-webkit-background-clip:text;color:transparent}.subtitle{font-size:clamp(18px,2vw,24px);max-width:860px;margin-top:24px;color:var(--ink-2)}.title{font-size:clamp(32px,4.8vw,58px);margin:18px 0 24px}.grid{display:grid;gap:18px}.cols2{grid-template-columns:1fr 1fr}.cols3{grid-template-columns:repeat(3,1fr)}.cols4{grid-template-columns:repeat(4,1fr)}.card{border:1px solid var(--line);background:var(--surface);border-radius:24px;padding:23px;box-shadow:0 24px 70px rgba(0,0,0,.38)}.strong{border-color:var(--lime-line);background:rgba(200,250,70,.06)}.badge{display:inline-flex;border:1px solid var(--line-strong);background:var(--surface-2);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:12px}.codebig{font-family:var(--heading);font-size:clamp(34px,5.6vw,68px);color:var(--lime);letter-spacing:-.06em}.lead{font-size:21px}.screen{aspect-ratio:16/9;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));display:flex;align-items:center;justify-content:center;color:var(--muted)}.screen img{width:100%;height:100%;object-fit:cover}.steps{counter-reset:item;display:grid;gap:12px}.step{display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:start;border:1px solid var(--line);border-radius:16px;padding:14px;background:var(--surface)}.step:before{counter-increment:item;content:counter(item);width:32px;height:32px;border-radius:99px;background:var(--lime);color:#101206;display:grid;place-items:center;font-weight:900}.cmd{background:var(--terminal);border:1px solid var(--lime-line);border-radius:18px;overflow:hidden;box-shadow:0 18px 55px rgba(0,0,0,.38)}.cmd-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--lime);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.cmd-type{color:var(--muted)}pre{margin:0;padding:20px;white-space:pre-wrap;word-break:keep-all;color:var(--ink-2);font-size:16px;line-height:1.62;font-family:'SFMono-Regular','Consolas','Menlo',monospace}.cmd.terminal pre{color:#d9d9d4}.cmd.claude pre{color:#f4f4f2}.note{margin-top:12px;color:var(--muted);font-size:15px}.nav{position:fixed;z-index:10;left:50%;bottom:22px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:rgba(15,15,17,.82);backdrop-filter:blur(14px);border-radius:999px;padding:10px}.nav button{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:999px;padding:10px 16px;font-weight:800;cursor:pointer}.nav .primary{background:var(--lime);color:#101206}.counter{color:var(--muted);font-size:13px;min-width:70px;text-align:center}.small{font-size:14px;color:var(--muted)}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:13px;text-align:left;vertical-align:top}.table th{color:var(--lime);font-size:12px;letter-spacing:.1em;text-transform:uppercase}.table td{color:var(--ink-2)}@media(max-width:900px){.cols2,.cols3,.cols4{grid-template-columns:1fr}.hero h1{font-size:42px}.title{font-size:34px}pre{font-size:14px}}@media print{body{background:#fff;color:#111}.slide{display:flex;min-height:auto;page-break-after:always}.nav{display:none}.card,.screen,.step,.cmd{box-shadow:none;background:#fff;color:#111;border-color:#ddd}}

<script id="fallback-data" type="application/json">{"meta":{"title":"Claude Code로 부동산 AI 결과물 만들기","subtitle":"AI 초보도 따라 치는 명령어 기반 제작 실습","design":"Mono Signal","version":"0.2.0","lastUpdated":"2026-07-07","updateRule":"새 결과물은 projects 배열에 객체 하나를 추가하고, Claude Code 입력 프롬프트를 commandBlocks에 넣는다."},"introCommands":[{"title":"공통 시작 명령","terminal":"mkdir my-ai-project\ncd my-ai-project\nclaude","explanation":"새 폴더를 만들고 그 폴더 안에서 Claude Code를 실행합니다. Claude Code는 현재 폴더를 작업 공간으로 보고 파일을 만들거나 수정합니다."},{"title":"Claude Code 첫 요청 공식","prompt":"너는 지금부터 이 폴더 안에서 작업하는 개발 튜터야.\n나는 코드를 잘 모르는 초보자야.\n바로 코딩하지 말고, 먼저 내가 만들 결과물의 파일 구조와 제작 순서를 PLAN.md로 정리해줘.\n내가 확인하면 그 다음에 실제 파일을 만들어줘.","explanation":"초보자는 바로 “만들어줘”라고 하지 말고, 먼저 계획 파일을 만들게 해야 합니다."},{"title":"파일 생성 요청 공식","prompt":"좋아. 이제 PLAN.md 기준으로 실제 파일을 만들어줘.\n조건:\n1. 초보자가 바로 열어볼 수 있게 만들어줘.\n2. 실행 방법을 마지막에 알려줘.\n3. 오류가 날 수 있는 부분은 네가 먼저 점검해줘.\n4. 디자인은 어두운 배경 + 라임색 포인트의 Mono Signal 스타일로 해줘.","explanation":"Claude Code가 파일을 만들고, 실행 방법까지 안내하도록 요청합니다."},{"title":"수정 요청 공식","prompt":"방금 만든 결과물을 기준으로 수정해줘.\n수정할 내용:\n- [여기에 바꿀 내용]\n주의:\n- 기존 기능은 깨지면 안 됨\n- 수정 후 어떤 파일을 바꿨는지 알려줘\n- 내가 확인할 실행 명령도 다시 알려줘","explanation":"수정은 한 번에 많이 하지 말고, 바꿀 내용을 목록으로 줍니다."}],"projects":[{"id":"apt-all-in-one","repo":"earthskyisbig/apt-all-in-one","title":"아파트 자동 분석 리포트 생성기","kind":"리포트 자동화","level":"중급 입문","liveUrl":"","visibility":"Private repo","oneLine":"입력 JSON을 넣으면 실거래 흐름과 아파트 가치를 HTML 리포트로 생성하는 자동화 도구","beginnerGoal":"Claude Code로 데이터 입력값, 분석 로직, HTML 리포트 템플릿을 순서대로 만들게 하는 방법을 익힌다.","outputFiles":["sample-data/realprice_sample.json","skills/realprice-flow/scripts/report_template.py","skills/realprice-flow/scripts/build_report.py","skills/apt-value/scripts/build_report.py","docs/previews/*.html"],"screenshots":[{"file":"apt-report-preview.png","label":"자동 리포트 미리보기","note":"Claude Code가 만든 HTML 리포트 결과 화면"}],"commandBlocks":[{"label":"1. 작업 폴더 만들기","type":"terminal","code":"mkdir apt-all-in-one\ncd apt-all-in-one\nclaude","say":"새 프로젝트 폴더를 만들고 Claude Code를 실행합니다."},{"label":"2. Claude Code에 붙여넣기: 먼저 설계만 시키기","type":"claude","code":"너는 부동산 데이터 리포트 자동화 개발자야.\n나는 코드를 잘 모르는 초보자야.\n아파트 실거래 흐름과 아파트 가치를 HTML 리포트로 만들어주는 자동화 도구를 만들고 싶어.\n\n바로 코딩하지 말고 먼저 PLAN.md를 만들어줘.\nPLAN.md에는 다음을 포함해줘.\n1. 입력 JSON 구조\n2. 출력 리포트 목차\n3. 필요한 파일 구조\n4. 각 파일의 역할\n5. 초보자가 실행할 명령어\n6. 더미 데이터로 미리보기 만드는 순서","say":"Claude Code에게 바로 만들라고 하지 말고, 먼저 설계 문서를 만들게 합니다."},{"label":"3. Claude Code에 붙여넣기: 실제 파일 생성","type":"claude","code":"좋아. PLAN.md 기준으로 실제 파일을 만들어줘.\n\n조건:\n- sample-data/realprice_sample.json 더미 데이터를 만들어줘.\n- skills/realprice-flow/scripts/report_template.py 에 HTML 템플릿 함수를 만들어줘.\n- skills/realprice-flow/scripts/build_report.py 는 JSON을 읽어 HTML 리포트를 생성하게 해줘.\n- skills/apt-value/scripts/build_report.py 는 아파트 가치 분석 리포트를 생성하게 해줘.\n- docs/previews/ 폴더에 미리보기 HTML이 생성되도록 해줘.\n- 디자인은 Mono Signal 스타일로 해줘.\n- 마지막에 내가 터미널에서 실행할 명령어를 알려줘.","say":"이 단계에서 Claude Code가 실제 폴더와 파일을 만듭니다."},{"label":"4. 결과 생성 확인 명령","type":"terminal","code":"python3 skills/realprice-flow/scripts/build_report.py sample-data/realprice_sample.json docs/previews/realprice-flow-preview.html\nopen docs/previews/realprice-flow-preview.html","say":"HTML 리포트가 생성되고 브라우저로 열리면 성공입니다."},{"label":"5. 수정 요청 예시","type":"claude","code":"리포트 첫 화면이 강의용으로 더 잘 보이게 수정해줘.\n1. 상단에 큰 제목과 핵심 요약 카드 3개를 넣어줘.\n2. 가격 흐름 섹션은 표보다 카드형으로 먼저 보여줘.\n3. 위험 신호는 라임색이 아니라 warn 색상으로 표시해줘.\n4. 수정 후 다시 실행할 명령어를 알려줘.","say":"초보자는 “예쁘게 해줘”가 아니라 어떤 섹션을 어떻게 바꿀지 말해야 합니다."}],"teachingPoint":"리포트 자동화는 “입력 JSON → 분석 함수 → HTML 템플릿 → preview 생성” 순서로 만든다."},{"id":"auction-mbti","repo":"friscomike94/auction_mbti","title":"부동산 투자성향 MBTI 웹앱","kind":"진단형 웹앱","level":"초급","liveUrl":"https://friscomike94.github.io/auction_mbti/","visibility":"Public GitHub Pages","oneLine":"질문에 답하면 매매/경매 투자성향 코드를 계산하고 결과 프로필을 보여주는 단일 HTML 웹앱","beginnerGoal":"Claude Code로 질문 데이터, 점수 계산, 결과 프로필이 들어간 단일 HTML 앱을 만드는 법을 익힌다.","outputFiles":["index.html","README.md"],"screenshots":[{"file":"auction-mbti-home.png","label":"투자성향 테스트 첫 화면","note":"질문형 웹앱의 시작 화면"}],"commandBlocks":[{"label":"1. 작업 폴더 만들기","type":"terminal","code":"mkdir auction_mbti\ncd auction_mbti\nclaude","say":"진단형 웹앱 프로젝트 폴더를 만들고 Claude Code를 실행합니다."},{"label":"2. Claude Code에 붙여넣기: 진단 구조 설계","type":"claude","code":"너는 진단형 웹앱을 만드는 개발 튜터야.\n나는 부동산 투자성향 테스트를 만들고 싶어.\n\n바로 코딩하지 말고 먼저 PLAN.md를 만들어줘.\n테스트 구조는 다음과 같아.\n- 매매 트랙: 리스크, 기간, 목적, 자금 4축\n- 경매 트랙: 자금, 난이도, 지역 3축\n- 각 질문은 2지선다\n- 답변 점수로 유형 코드를 만든다\n- 결과 화면에는 유형명, 강점, 약점, 맹점, 추천 전략이 나온다\n\nPLAN.md에는 DATA 구조, 점수 계산 방식, 결과 프로필 구조, 화면 구성, 파일 구조를 설명해줘.","say":"질문형 서비스는 먼저 축과 점수 구조를 확정해야 합니다."},{"label":"3. Claude Code에 붙여넣기: 단일 HTML 생성","type":"claude","code":"좋아. 이제 PLAN.md 기준으로 단일 파일 index.html을 만들어줘.\n\n조건:\n1. HTML/CSS/JS를 index.html 하나에 모두 넣어줘.\n2. const DATA 안에 질문, 축, 유형, 결과 프로필을 넣어줘.\n3. 시작 화면 → 트랙 선택 → 질문 화면 → 결과 화면 흐름으로 만들어줘.\n4. 결과 URL 공유 기능은 나중에 붙일 수 있게 구조를 열어둬.\n5. 디자인은 Mono Signal 스타일로 해줘.\n6. 모바일보다 강의 녹화용 16:9 화면에서 보기 좋게 만들어줘.\n7. 파일 생성 후 open index.html 명령으로 확인할 수 있게 해줘.","say":"초보자는 파일 여러 개보다 index.html 하나로 시작하는 것이 쉽습니다."},{"label":"4. 결과 확인 명령","type":"terminal","code":"open index.html","say":"브라우저에서 첫 화면이 열리고 질문을 끝까지 진행할 수 있으면 성공입니다."},{"label":"5. 수정 요청 예시: 축/문항 변경","type":"claude","code":"경매 트랙을 수정해줘.\n1. PURPOSE 축은 삭제해줘.\n2. 경매 결과 유형은 16개에서 8개로 줄여줘.\n3. 경매 질문 중 중복되는 문항은 제거해줘.\n4. 결과 코드도 A-scn처럼 3축 코드로 바꿔줘.\n5. index.html 전체에서 오래된 4축 설명이 남아있지 않은지 확인해줘.\n6. 수정 후 어떤 부분을 바꿨는지 요약해줘.","say":"데이터 구조를 바꾸면 질문, 유형 코드, 결과 프로필, 화면 문구를 함께 바꾸게 해야 합니다."}],"teachingPoint":"진단형 웹앱은 “축 설계 → 질문 DATA → 점수 계산 → 결과 프로필” 순서로 만든다."},{"id":"auction-crwal0629","repo":"friscomike94/auction-crwal0629","title":"Auction Signal 데이터 대시보드","kind":"데이터 대시보드","level":"초급~중급","liveUrl":"https://friscomike94.github.io/auction-crwal0629/","visibility":"Public GitHub Pages","oneLine":"경매 데이터를 KPI 카드, 위험 신호, 상세 테이블로 보여주는 Mono Signal 대시보드","beginnerGoal":"Claude Code로 더미 데이터 기반 대시보드를 먼저 만들고 실제 데이터로 교체하는 방법을 익힌다.","outputFiles":["docs/index.html"],"screenshots":[{"file":"auction-crwal-dashboard.png","label":"Auction Signal 대시보드","note":"KPI 카드와 테이블이 있는 대시보드 화면"}],"commandBlocks":[{"label":"1. 작업 폴더 만들기","type":"terminal","code":"mkdir auction-crwal0629\ncd auction-crwal0629\nclaude","say":"대시보드 프로젝트 폴더를 만들고 Claude Code를 실행합니다."},{"label":"2. Claude Code에 붙여넣기: 대시보드 설계","type":"claude","code":"너는 데이터 대시보드 UI를 만드는 개발 튜터야.\n나는 부동산 경매 데이터를 보여주는 대시보드를 만들고 싶어.\n\n바로 코딩하지 말고 먼저 PLAN.md를 만들어줘.\n대시보드는 다음 구조로 설계해줘.\n1. 상단: 핵심 KPI 카드 4개\n2. 중간: 위험 신호 또는 추천 물건 패널\n3. 하단: 상세 데이터 테이블\n4. 데이터는 처음에는 더미 데이터로 시작\n5. 나중에 실제 CSV/JSON 데이터로 교체 가능하게 만들기\n\n파일은 docs/index.html 하나로 시작하는 구조를 제안해줘.","say":"대시보드는 먼저 “무슨 판단을 시킬 것인가”를 정해야 합니다."},{"label":"3. Claude Code에 붙여넣기: docs/index.html 생성","type":"claude","code":"좋아. PLAN.md 기준으로 docs/index.html을 만들어줘.\n\n조건:\n- HTML/CSS/JS를 한 파일에 넣어줘.\n- 더미 경매 데이터 8~12개를 JS 배열로 넣어줘.\n- 상단 KPI 카드에는 총 물건 수, 평균 낙찰가율, 위험 물건 수, 관심 지역 수를 보여줘.\n- 중간에는 “Signal” 카드로 주목할 물건 3개를 보여줘.\n- 하단에는 상세 테이블을 넣어줘.\n- 디자인은 Mono Signal 스타일로 해줘.\n- GitHub Pages에서 docs 폴더로 배포할 수 있게 만들어줘.\n- 생성 후 확인 명령어를 알려줘.","say":"GitHub Pages에서 docs 폴더 배포를 염두에 두고 처음부터 docs/index.html로 만듭니다."},{"label":"4. 결과 확인 명령","type":"terminal","code":"open docs/index.html","say":"브라우저에서 KPI 카드와 테이블이 보이면 성공입니다."},{"label":"5. 수정 요청 예시: 실제 데이터 구조로 교체","type":"claude","code":"대시보드의 더미 데이터를 실제 데이터 구조에 맞게 바꿔줘.\n새 데이터 컬럼은 다음과 같아.\n- case_no\n- address\n- appraisal_price\n- min_bid_price\n- fail_count\n- auction_date\n- risk_label\n\n이 컬럼 기준으로 KPI와 테이블을 다시 계산하게 수정해줘.\n수정 후 docs/index.html에서 어떤 부분이 바뀌었는지 알려줘.","say":"처음엔 더미 데이터로 만들고, 나중에 컬럼명을 주면서 실제 구조로 바꿉니다."}],"teachingPoint":"대시보드는 “더미 데이터 → 화면 구조 → 실제 데이터 교체” 순서로 만드는 것이 가장 쉽다."},{"id":"malso-standard-rights-deck","repo":"friscomike94/malso-standard-rights-deck","title":"말소기준권리 강의용 웹덱","kind":"HTML 강의덱","level":"초급","liveUrl":"https://friscomike94.github.io/malso-standard-rights-deck/","visibility":"Public GitHub Pages","oneLine":"강의 원고를 16:9 HTML 슬라이드 덱으로 변환한 웹 강의자료","beginnerGoal":"Claude Code로 강의 목차를 만들고, 그것을 넘기는 HTML 슬라이드로 변환하는 방법을 익힌다.","outputFiles":["index.html"],"screenshots":[{"file":"malso-deck.png","label":"말소기준권리 웹덱","note":"HTML로 만든 강의 슬라이드"}],"commandBlocks":[{"label":"1. 작업 폴더 만들기","type":"terminal","code":"mkdir malso-standard-rights-deck\ncd malso-standard-rights-deck\nclaude","say":"강의덱 프로젝트 폴더를 만들고 Claude Code를 실행합니다."},{"label":"2. Claude Code에 붙여넣기: 강의 목차 설계","type":"claude","code":"너는 부동산 경매 초보자를 가르치는 강의자료 제작자야.\n주제는 말소기준권리야.\n\n바로 코딩하지 말고 먼저 SLIDE_PLAN.md를 만들어줘.\n조건:\n1. 총 10장짜리 강의덱\n2. AI 초보/경매 초보도 이해할 수 있는 흐름\n3. 각 슬라이드에 제목, 핵심 문장, 예시, 강의자가 말할 포인트 포함\n4. 법률 조문보다 “입찰자가 무엇을 조심해야 하는지” 중심\n5. 마지막에는 초보자 체크리스트 포함","say":"강의덱은 코딩 전에 목차와 강의 흐름부터 잡아야 합니다."},{"label":"3. Claude Code에 붙여넣기: HTML 슬라이드 생성","type":"claude","code":"좋아. SLIDE_PLAN.md 기준으로 index.html 강의덱을 만들어줘.\n\n조건:\n- 16:9 슬라이드 형태\n- 좌우 버튼으로 넘기기\n- 키보드 화살표로 넘기기\n- 각 슬라이드가 한 화면 안에 들어오게 하기\n- 글자 크기는 강의 녹화에서 잘 보이게 크게\n- 디자인은 Mono Signal 스타일\n- HTML/CSS/JS를 index.html 하나에 모두 넣기\n- 마지막에 open index.html로 확인할 수 있게 안내하기","say":"PPT가 아니라 HTML 한 파일로 슬라이드가 나오게 만듭니다."},{"label":"4. 결과 확인 명령","type":"terminal","code":"open index.html","say":"브라우저에서 슬라이드가 열리고 버튼/화살표로 넘어가면 성공입니다."},{"label":"5. 수정 요청 예시: 강의 녹화용 조정","type":"claude","code":"강의 녹화용으로 index.html을 점검하고 수정해줘.\n1. 모든 슬라이드가 16:9 화면 안에 들어오는지 확인해줘.\n2. 글자가 너무 작거나 넘치는 슬라이드를 수정해줘.\n3. 각 슬라이드 하단에 현재 페이지 번호를 넣어줘.\n4. 발표자가 말할 핵심 문장을 더 명확하게 바꿔줘.\n5. 수정 후 어떤 슬라이드를 바꿨는지 알려줘.","say":"강의용 덱은 예쁜 것보다 화면 안에 안 넘치고 크게 보이는 것이 중요합니다."}],"teachingPoint":"HTML 강의덱은 “목차 설계 → 슬라이드 문장 → 16:9 HTML → 넘침 점검” 순서로 만든다."}]}</script>
<script>
var DATA = JSON.parse(document.getElementById('fallback-data').textContent);
var slides = []; var current = 0;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slide(html){var sec=document.createElement('section');sec.className='slide';sec.innerHTML='<div class="frame">'+html+'</div>';slides.push(sec);document.getElementById('deck').appendChild(sec);}
function cmdBlock(b){var typ=b.type||'claude';var label=typ==='terminal'?'TERMINAL':'CLAUDE CODE INPUT';return '<div class="cmd '+esc(typ)+'"><div class="cmd-head"><span>'+esc(label)+'</span><span class="cmd-type">'+esc(b.label||'')+'</span></div><pre>'+esc(b.code||'')+'</pre></div>'+(b.say?'<p class="note">'+esc(b.say)+'</p>':'');}
function screenShot(p){var s=(p.screenshots&&p.screenshots[0])||{};if(!s.file){return '<div class="screen"><span>SCREEN CAPTURE</span></div>';}return '<div class="screen"><img src="assets/screenshots/'+esc(s.file)+'" alt="'+esc(s.label||p.title)+'"></div><p class="small">'+esc(s.label||p.title)+' · '+esc(s.note||'')+'</p>';}
function stepList(arr){return '<div class="steps">'+(arr||[]).map(function(x){return '<div class="step">'+esc(x)+'</div>';}).join('')+'</div>';}
function render(){var p=DATA.projects;document.getElementById('deck').innerHTML='';slides=[];
slide('<div class="hero"><span class="kicker">'+esc(DATA.meta.design)+' · Claude Code Workshop</span><h1>Claude Code에<br><em>정확히 뭘 입력하면</em><br>결과물이 나오는가</h1><p class="subtitle">터미널 명령어 + Claude Code 프롬프트 + 확인 명령까지 그대로 따라 치는 부동산 AI 제작 실습</p></div>');
slide('<span class="kicker">오늘의 목표</span><h2 class="title">GitHub 사용법이 아니라<br>Claude Code에게 일 시키는 법을 배웁니다</h2><div class="grid cols2"><div class="card strong"><div class="codebig">INPUT → FILES → PREVIEW</div><p class="lead">명령어를 치고, Claude Code에 프롬프트를 넣고, 생성된 파일을 열어 확인합니다.</p></div><div class="card">'+stepList(['터미널에서 프로젝트 폴더 생성','claude 명령으로 Claude Code 실행','계획부터 만들게 지시','파일 생성 지시','open 명령으로 결과 확인','수정 요청으로 반복 개선'])+'</div></div>');
slide('<span class="kicker">공통 시작</span><h2 class="title">모든 프로젝트는 이 명령으로 시작합니다</h2><div class="grid cols2"><div>'+cmdBlock({type:'terminal',label:'공통 시작 명령',code:DATA.introCommands[0].terminal,say:'폴더 이름만 프로젝트에 맞게 바꿉니다.'})+'</div><div class="card"><h3>강의에서 강조할 말</h3><p class="lead">Claude Code는 “현재 폴더 안에서 일하는 개발자”입니다. 그래서 먼저 작업 폴더를 만들고 그 안에서 실행해야 합니다.</p></div></div>');

p.forEach(function(x,i){var n=String(i+1).padStart(2,'0');slide('<span class="kicker">CASE '+n+' · '+esc(x.kind)+'</span><h2 class="title">'+esc(x.title)+'</h2><div class="grid cols2"><div>'+screenShot(x)+'</div><div class="card strong"><h3>이 결과물의 제작 원리</h3><p class="lead">'+esc(x.beginnerGoal)+'</p><p>'+esc(x.oneLine)+'</p><p class="small">완성 파일: '+esc((x.outputFiles||[]).join(', '))+'</p></div></div>');(x.commandBlocks||[]).forEach(function(b,bi){slide('<span class="kicker">CASE '+n+' · STEP '+String(bi+1).padStart(2,'0')+'</span><h2 class="title">'+esc(x.title)+'<br>'+esc(b.label)+'</h2><div class="grid cols2"><div>'+cmdBlock(b)+'</div><div class="card"><h3>강의자가 설명할 포인트</h3><p class="lead">'+esc(b.say||'')+'</p><p class="small">그대로 복사해서 터미널 또는 Claude Code 입력창에 넣는 장면을 캡처하면 됩니다.</p></div></div>');});});
slide('<span class="kicker">새 결과물 추가법</span><h2 class="title">새 결과물은 commandBlocks만 추가하면 됩니다</h2><div class="grid cols2"><div class="card">'+stepList(['data/projects.json 열기','projects 배열에 새 객체 추가','commandBlocks에 terminal/claude 입력문 추가','assets/screenshots에 결과 화면 캡처 추가','commit하면 강의덱 자동 업데이트'])+'</div><div>'+cmdBlock({type:'claude',label:'새 항목 생성 요청',code:'이 강의덱에 새 결과물을 추가하고 싶어.\ndata/projects.json에 넣을 project 객체를 만들어줘.\n반드시 commandBlocks 안에 terminal 명령, Claude Code 프롬프트, 확인 명령, 수정 요청 예시를 포함해줘.'})+'</div></div>');

show(0);}
function show(i){current=Math.max(0,Math.min(i,slides.length-1));slides.forEach(function(s,k){s.classList.toggle('active',k===current);});document.getElementById('count').textContent=(current+1)+' / '+slides.length;location.hash='s'+(current+1);}document.getElementById('prev').onclick=function(){show(current-1)};document.getElementById('next').onclick=function(){show(current+1)};window.onkeydown=function(e){if(e.key==='ArrowRight'||e.key===' '){show(current+1)}if(e.key==='ArrowLeft'){show(current-1)}};
function start(){var m=location.hash.match(/s(d+)/);render();if(m){show(Number(m[1])-1)}}
if(location.protocol==='file:'){start();}else{fetch('data/projects.json').then(function(r){return r.ok?r.json():DATA}).then(function(j){DATA=j;start();}).catch(start)}
