<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />

<title>아무것도 몰라도 따라 만드는 설명서</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root{--bg:#0d0f12;--bg2:#14171c;--surface:#181c22;--surface2:#1f242b;--ink:#f2f4f6;--ink2:#c4cad2;--muted:#8b929c;--line:#2a2f37;--line2:#3a414b;--accent:#7cc4ff;--term:#0a0c0f;--good:#8fe08a;--warn:#ffc266;--font:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:var(--font);line-height:1.6}
h1,h2,h3,h4{margin:0;line-height:1.15;font-weight:800}p{margin:0;color:var(--ink2)}
.slide{min-height:100vh;padding:44px clamp(22px,4vw,60px) 96px;display:none;align-items:center}.slide.active{display:flex}.frame{width:min(1120px,100%);margin:0 auto}
.kicker{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line2);background:var(--surface);border-radius:999px;padding:7px 13px;color:var(--ink2);font-size:12px;font-weight:800;letter-spacing:.06em}.kicker:before{content:'';width:7px;height:7px;border-radius:99px;background:var(--accent)}
.phase{display:inline-block;margin-left:8px;padding:3px 9px;border-radius:7px;background:var(--surface2);border:1px solid var(--line2);color:var(--accent);font-size:12px;font-weight:800}
.cover h1{font-size:clamp(36px,5.5vw,68px);margin-top:20px;letter-spacing:-.03em}.cover .sub{font-size:clamp(17px,2vw,23px);margin-top:20px;color:var(--ink2);max-width:840px}.how{margin-top:26px;border-left:3px solid var(--accent);background:var(--surface);border-radius:0 12px 12px 0;padding:16px 20px;font-size:16px;color:var(--ink);max-width:880px}
.stitle{font-size:clamp(26px,3.6vw,44px);margin:12px 0 22px;letter-spacing:-.02em}
.grid{display:grid;gap:16px}.cols2{grid-template-columns:1fr 1fr}
.card{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:22px}.card h3{font-size:19px;margin-bottom:10px}
.legend{display:grid;gap:10px;margin-top:8px}.leg{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center;font-size:15px;color:var(--ink2)}.chip{text-align:center;border-radius:8px;padding:7px 8px;font-weight:800;font-size:13px}.chip.t{background:#0a1a10;color:var(--good);border:1px solid #1f5136}.chip.c{background:#0a1622;color:var(--accent);border:1px solid #1f4160}.chip.b{background:var(--surface2);color:var(--ink2);border:1px solid var(--line2)}
.big{font-size:clamp(20px,2.4vw,30px);font-weight:800;margin-bottom:18px;color:var(--ink)}
.cmd{border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:var(--term)}.cmd-head{display:flex;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--surface);font-size:12px;font-weight:800;letter-spacing:.08em}.cmd.terminal .cmd-head{color:var(--good)}.cmd.claude .cmd-head{color:var(--accent)}
pre{margin:0;padding:20px;white-space:pre-wrap;word-break:keep-all;color:var(--ink);font-family:'SFMono-Regular','Menlo',monospace;font-size:clamp(15px,1.7vw,19px);line-height:1.7}
.clicks{counter-reset:c;display:grid;gap:11px}.click{display:grid;grid-template-columns:34px 1fr;gap:13px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--surface);font-size:clamp(16px,1.8vw,20px);color:var(--ink)}.click:before{counter-increment:c;content:counter(c);width:26px;height:26px;border-radius:7px;background:var(--surface2);border:1px solid var(--line2);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:14px}
.checkbox{border:1px solid var(--good);background:rgba(143,224,138,.08);border-radius:16px;padding:22px}.checkbox .cmd{margin-top:12px}
.note{margin-top:16px;color:var(--muted);font-size:clamp(14px,1.5vw,17px);line-height:1.6}
.progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:20;transition:width .3s}
.nav{position:fixed;z-index:10;left:50%;bottom:18px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;border:1px solid var(--line2);background:rgba(13,15,18,.92);backdrop-filter:blur(12px);border-radius:999px;padding:8px}.nav button{border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:999px;padding:9px 15px;font-weight:700;cursor:pointer}.nav .primary{background:var(--accent);color:#08222f;border-color:var(--accent)}.counter{color:var(--muted);font-size:13px;min-width:70px;text-align:center}
a{color:var(--accent)}
@media(max-width:900px){.cols2{grid-template-columns:1fr}.leg{grid-template-columns:100px 1fr}.cover h1{font-size:34px}.stitle{font-size:26px}}
@media print{body{background:#fff;color:#111}.slide{display:flex;min-height:auto;page-break-after:always}.nav,.progress{display:none}.card,.cmd,.click,.checkbox{background:#fff;color:#111;border-color:#ccc}}
</style>
</head>

형 계산\" 규칙을 만듭니다."},{"phase":"제작","kind":"claude","title":"5. (3단계) 유형별 결과 글 쓰기","code":"각 유형마다 강점, 약점, 조심할 점, 추천 전략을\n_workspace/03_profiles.md 로 정리해줘.","note":"결과 화면에 보여줄 유형 설명을 만듭니다."},{"phase":"제작","kind":"claude","title":"6. (4단계) 하나의 웹페이지로 조립","code":"이제 02_questions.json, 02_scoring.md, 03_profiles.md 를 합쳐서\nindex.html 웹페이지 한 파일로 만들어줘.\n- 시작 화면 → 질문 → 결과 순서로\n- 답하면 유형이 계산돼 결과가 나오게\n마지막에 브라우저로 여는 방법도 알려줘.","note":"앞 단계 산출물을 하나의 완성 웹페이지로 합칩니다."},{"phase":"확인","kind":"terminal","title":"7. 내 컴퓨터에서 열어보기","code":"open index.html","note":"브라우저가 열리고 테스트가 끝까지 되면 성공. 이상하면 파란 박스로 \"이 부분 고쳐줘\"라고 말합니다."},{"phase":"깃허브 올리기","kind":"browser","title":"8. GitHub에 새 저장소 만들기","clicks":["github.com 로그인","오른쪽 위 + 버튼 → New repository","Repository name 에 auction_mbti 입력","Public 선택","Create repository 클릭"],"note":"결과물을 인터넷에 올릴 \"저장소\"를 만듭니다."},{"phase":"깃허브 올리기","kind":"browser","title":"9. 파일 업로드하기","clicks":["방금 만든 저장소 화면에서 uploading an existing file 링크 클릭","내 컴퓨터의 index.html 파일을 화면으로 드래그","아래 초록 Commit changes 버튼 클릭"],"note":"만든 index.html을 저장소에 올립니다."},{"phase":"배포","kind":"browser","title":"10. 인터넷 주소로 공개하기 (Pages)","clicks":["저장소 상단 Settings 클릭","왼쪽 메뉴에서 Pages 클릭","Source: Deploy from a branch","Branch: main / (root) 선택 후 Save"],"note":"GitHub Pages를 켜면 누구나 접속할 주소가 생깁니다."},{"phase":"완성","kind":"check","title":"11. 완성! 주소 확인","code":"https://\u003c내아이디>.github.io/auction_mbti/","note":"1~2분 뒤 Pages 화면에 뜨는 주소로 접속하면, 내가 만든 투자성향 테스트가 인터넷에 공개됩니다."}]},{"id":"auction-crwal0629","title":"auction_crawl 백지에서 만드는 법","kind":"법원경매 데이터 수집기 + 대시보드","liveUrl":"https://friscomike94.github.io/auction-crwal0629/","whatItIs":"법원경매 사이트에서 경매 물건을 자동으로 긁어 CSV로 모으고, 보기 좋은 대시보드로 만듭니다. 데이터 자동화라 조금 어렵지만 순서대로 하면 됩니다.","manual":[{"phase":"폴더 준비","kind":"terminal","title":"1. 작업 폴더 만들기","code":"mkdir auction_crawl\ncd auction_crawl","note":"이 프로젝트를 담을 빈 폴더를 만들고 들어갑니다."},{"phase":"폴더 준비","kind":"terminal","title":"2. Claude Code 켜기","code":"claude","note":"폴더 안에서 claude 실행."},{"phase":"제작","kind":"claude","title":"3. 수집 시도 시키기 (막혀도 정상)","code":"대한민국 법원경매 사이트(courtauction.go.kr)에서\n경매 물건 목록을 자동으로 수집해 CSV로 저장하고 싶어.\n먼저 사이트 구조를 조사하고 수집을 시도해줘.\n막히면 원인을 분석하고 다른 방법을 시도해줘. 필요한 프로그램도 설치해줘.","note":"이 사이트는 처음엔 막힙니다(차단·감지). 그 막힘을 Claude와 같이 뚫는 게 이 프로젝트의 핵심입니다."},{"phase":"제작","kind":"claude","title":"4. 뚫은 방법을 스킬로 저장","code":"이제 수집이 되네. 방금 성공한 방법과 실패했던 방법을 정리해줘.\n- skill/SKILL.md : 작동하는 방법과 \"하면 안 되는 것\"\n- skill/references/trial-and-error.md : 막혔던 경우들\n다음엔 이 스킬만 읽고 바로 되게.","note":"뚫은 노하우를 파일로 남겨야 다음에 다시 헤매지 않습니다."},{"phase":"확인","kind":"terminal","title":"5. 수집 결과 열어보기","code":"open auction_list.csv","note":"CSV에 사건번호·주소·감정가 등이 채워져 있으면 성공."},{"phase":"제작","kind":"claude","title":"6. 대시보드 만들기","code":"수집한 CSV를 보기 좋게 보여주는 대시보드를 만들어줘.\n- docs/index.html 한 파일로\n- 위에는 핵심 숫자 카드, 아래에는 물건 표\n마지막에 여는 방법도 알려줘.","note":"표 데이터를 한눈에 보는 대시보드 웹페이지를 만듭니다."},{"phase":"깃허브 올리기","kind":"browser","title":"7. GitHub 저장소 만들기","clicks":["github.com 로그인","+ → New repository","이름 auction_crawl 입력","Public 선택","Create repository"],"note":""},{"phase":"깃허브 올리기","kind":"browser","title":"8. 파일 업로드","clicks":["저장소에서 Add file → Upload files","수집 스크립트(.py)와 docs 폴더를 드래그","Commit changes 클릭"],"note":"스크래퍼 코드와 대시보드(docs/index.html)를 올립니다."},{"phase":"배포","kind":"browser","title":"9. 대시보드 공개 (Pages, docs 폴더)","clicks":["Settings → Pages","Source: Deploy from a branch","Branch: main / docs 선택 후 Save"],"note":"대시보드는 docs 폴더에 있으니 폴더를 /docs 로 지정합니다."},{"phase":"완성","kind":"check","title":"10. 완성! 대시보드 주소","code":"https://\u003c내아이디>.github.io/auction_crawl/","note":"뜨는 주소로 접속하면 경매 대시보드가 공개됩니다."}]},{"id":"malso-standard-rights-deck","title":"malso_deck 백지에서 만드는 법","kind":"강의용 슬라이드 웹페이지","liveUrl":"https://friscomike94.github.io/malso-standard-rights-deck/","whatItIs":"PPT 없이, 인터넷에서 넘겨보는 강의 슬라이드를 HTML 한 파일로 만듭니다. 가장 쉬운 프로젝트입니다.","manual":[{"phase":"폴더 준비","kind":"terminal","title":"1. 작업 폴더 만들기","code":"mkdir malso_deck\ncd malso_deck","note":"빈 폴더를 만들고 들어갑니다."},{"phase":"폴더 준비","kind":"terminal","title":"2. Claude Code 켜기","code":"claude","note":"폴더 안에서 claude 실행."},{"phase":"제작","kind":"claude","title":"3. 목차부터 만들기","code":"말소기준권리를 처음 배우는 사람을 위한\n10장짜리 강의 슬라이드를 만들 거야.\n먼저 10장의 목차와 각 장의 핵심 문장을 정리해줘.","note":"슬라이드를 바로 만들기보다 목차부터. 주제는 원하는 걸로 바꿔도 됩니다."},{"phase":"제작","kind":"claude","title":"4. 슬라이드 웹페이지 만들기","code":"그 목차대로 index.html 한 파일로 슬라이드를 만들어줘.\n- 좌우 버튼과 키보드 화살표로 넘기게\n- 각 슬라이드가 한 화면에 꽉 차게\n마지막에 여는 방법도 알려줘.","note":"HTML 한 파일에 모든 슬라이드가 들어갑니다."},{"phase":"확인","kind":"terminal","title":"5. 열어보기","code":"open index.html","note":"화살표로 슬라이드가 넘어가면 성공."},{"phase":"깃허브 올리기","kind":"browser","title":"6. GitHub 저장소 만들기","clicks":["github.com 로그인","+ → New repository","이름 malso_deck 입력","Public 선택","Create repository"],"note":""},{"phase":"깃허브 올리기","kind":"browser","title":"7. 파일 업로드","clicks":["Add file → Upload files","index.html 드래그","Commit changes 클릭"],"note":"파일 하나만 올리면 됩니다."},{"phase":"배포","kind":"browser","title":"8. 공개하기 (Pages)","clicks":["Settings → Pages","Source: Deploy from a branch","Branch: main / (root) 후 Save"],"note":""},{"phase":"완성","kind":"check","title":"9. 완성! 슬라이드 주소","code":"https://\u003c내아이디>.github.io/malso_deck/","note":"뜨는 주소로 접속하면 강의 슬라이드가 공개됩니다."}]},{"id":"apt-all-in-one","title":"apt_report 백지에서 만드는 법","kind":"아파트 실거래 분석 리포트 (API 키 필요)","liveUrl":"","whatItIs":"국토부 실거래가 데이터를 받아와 아파트 가격 흐름 리포트를 자동으로 만듭니다. 정부 데이터 열쇠(API 키)가 필요해 준비물이 하나 더 있습니다.","manual":[{"phase":"열쇠 준비","kind":"browser","title":"1. 실거래가 데이터 열쇠(API 키) 받기","clicks":["data.go.kr(공공데이터포털) 접속·가입","\"아파트 매매 실거래가\" 검색","활용신청 클릭","발급된 \"일반 인증키(Decoding)\" 복사"],"note":"이게 없으면 데이터를 못 받습니다. 이 프로젝트만의 0단계입니다."},{"phase":"폴더 준비","kind":"terminal","title":"2. 폴더 만들고 열쇠 저장","code":"mkdir apt_report\ncd apt_report\necho \"PUBLIC_DATA_SERVICE_KEY=여기에복사한키\" > .env\nclaude","note":"폴더를 만들고, 받은 키를 .env 파일에 저장한 뒤 claude 실행. (키는 채팅에 붙여넣지 마세요.)"},{"phase":"제작","kind":"claude","title":"3. 데이터 수집 시키기","code":"국토부 실거래가 데이터로 강남구 아파트 최근 5년 매매/전세를 수집하고 싶어.\n인증키는 .env 파일의 PUBLIC_DATA_SERVICE_KEY에서 읽게 하고,\n결과를 sale.csv, rent.csv 로 저장하는 스크립트를 만들어 실행해줘. 필요한 프로그램도 설치해줘.","note":"키를 채팅이 아니라 .env에서 읽게 하는 게 안전합니다."},{"phase":"제작","kind":"claude","title":"4. 분석 + 리포트 만들기","code":"수집한 CSV로 평당가 흐름, 전세가율, 거래량을 계산하고,\n그 결과를 보기 좋은 HTML 리포트(report.html)로 만들어줘.\n중간에 막힌 부분은 gotchas.md에 기록해줘.","note":"수집 → 분석 → 리포트 순서로 만듭니다."},{"phase":"확인","kind":"terminal","title":"5. 리포트 열어보기","code":"open report.html","note":"가격 흐름 그래프와 표가 보이면 성공."},{"phase":"깃허브 올리기","kind":"browser","title":"6. GitHub 저장소 만들기 (Private 권장)","clicks":["github.com 로그인","+ → New repository","이름 apt_report 입력","Private 선택(데이터·키 보호)","Create repository"],"note":"키와 개인 데이터가 있으니 Private(비공개)로 만듭니다."},{"phase":"깃허브 올리기","kind":"browser","title":"7. 파일 업로드 (.env 제외!)","clicks":["Add file → Upload files","스크립트와 report.html 등을 드래그",".env 파일은 절대 올리지 않기","Commit changes 클릭"],"note":"인증키가 든 .env는 올리면 안 됩니다."},{"phase":"완성","kind":"check","title":"8. 완성","code":"(Private이라 공개 주소는 없음)","note":"Private 저장소라 인터넷 공개 주소는 없습니다. 리포트는 파일로 공유하거나, 미리보기만 따로 공개할 수 있습니다."}]}]}</script>
<script>
var DATA = JSON.parse(document.getElementById('fallback-data').textContent);
var slides=[]; var current=0;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slide(html){var s=document.createElement('section');s.className='slide';s.innerHTML='<div class="frame">'+html+'</div>';slides.push(s);document.getElementById('deck').appendChild(s);}
function clicks(arr){return '<div class="clicks">'+(arr||[]).map(function(x){return '<div class="click">'+esc(x)+'</div>';}).join('')+'</div>';}
function cmd(kind,code){var lbl=kind==='terminal'?'터미널에 입력':'Claude Code에 붙여넣기';var cls=kind==='terminal'?'terminal':'claude';return '<div class="cmd '+cls+'"><div class="cmd-head"><span>'+lbl+'</span></div><pre>'+esc(code)+'</pre></div>';}
function stepBody(st){
  if(st.kind==='terminal') return cmd('terminal', st.code);
  if(st.kind==='claude') return cmd('claude', st.code);
  if(st.kind==='browser') return clicks(st.clicks);
  if(st.kind==='check') return '<div class="checkbox"><div class="big">완성 확인</div>'+cmd('terminal', st.code)+'</div>';
  return '<div class="card"><p>'+esc(st.code||'')+'</p></div>';
}
function render(){var m=DATA.meta;document.getElementById('deck').innerHTML='';slides=[];
slide('<div class="cover"><span class="kicker">따라 하는 설명서</span><h1>'+esc(m.title)+'</h1><p class="sub">'+esc(m.subtitle)+'</p><div class="how">'+esc(m.howToUse)+'</div></div>');
slide('<span class="kicker">읽는 법</span><h2 class="stitle">3가지 박스만 기억하세요</h2><div class="card"><div class="legend"><div class="leg"><span class="chip t">터미널</span><span>초록 박스 = 검은 터미널 창에 그대로 입력하고 Enter</span></div><div class="leg"><span class="chip c">Claude Code</span><span>파란 박스 = Claude Code 창에 그대로 붙여넣기</span></div><div class="leg"><span class="chip b">화면 클릭</span><span>회색 단계 = 웹사이트에서 순서대로 눌러야 할 것</span></div></div></div>');
var pq=DATA.prerequisites;slide('<span class="kicker">시작 전 준비</span><h2 class="stitle">'+esc(pq.title)+'</h2><div class="grid cols2">'+(pq.steps||[]).map(function(st){return '<div class="card"><h3>'+esc(st.title)+'</h3>'+(st.kind==='terminal'?cmd('terminal',st.code):clicks(st.clicks))+'<p class="note">'+esc(st.note||'')+'</p></div>';}).join('')+'</div>');
DATA.projects.forEach(function(x,i){var n=String(i+1).padStart(2,'0');var total=x.manual.length;
slide('<span class="kicker">CASE '+n+'</span><h2 class="stitle">'+esc(x.title)+'</h2><div class="grid cols2"><div class="card"><h3>무엇을 만드나</h3><p style="font-size:18px;color:var(--ink)">'+esc(x.whatItIs)+'</p>'+(x.liveUrl?'<p class="note">완성 예시: <a href="'+esc(x.liveUrl)+'" target="_blank">'+esc(x.liveUrl)+'</a></p>':'')+'</div><div class="card"><h3>이 케이스는 총 '+total+'단계</h3><p>아래 슬라이드를 순서대로 따라 하면, 빈 폴더에서 시작해 완성까지 갑니다.</p><p class="note">초록=터미널, 파랑=Claude Code, 회색=화면 클릭</p></div></div>');
x.manual.forEach(function(st,si){slide('<span class="kicker">CASE '+n+' · '+(si+1)+'/'+total+'<span class="phase">'+esc(st.phase)+'</span></span><h2 class="stitle">'+esc(st.title)+'</h2>'+stepBody(st)+'<p class="note">'+esc(st.note||'')+'</p>');});
});
slide('<span class="kicker">끝</span><h2 class="stitle">순서만 지키면 누구나 만듭니다</h2><div class="card"><div class="legend"><div class="leg"><span class="chip b">1</span><span>빈 폴더 만들기 → Claude Code 켜기</span></div><div class="leg"><span class="chip b">2</span><span>한 번에 만들지 말고 단계로 시키기</span></div><div class="leg"><span class="chip b">3</span><span>내 컴퓨터에서 열어 확인</span></div><div class="leg"><span class="chip b">4</span><span>GitHub에 업로드 → Pages로 공개</span></div></div></div>');
show(0);}
function show(i){current=Math.max(0,Math.min(i,slides.length-1));slides.forEach(function(s,k){s.classList.toggle('active',k===current);});document.getElementById('count').textContent=(current+1)+' / '+slides.length;document.getElementById('prog').style.width=((current+1)/slides.length*100)+'%';location.hash='s'+(current+1);}
document.getElementById('prev').onclick=function(){show(current-1)};document.getElementById('next').onclick=function(){show(current+1)};
window.onkeydown=function(e){if(e.key==='ArrowRight'||e.key===' '){show(current+1)}if(e.key==='ArrowLeft'){show(current-1)}};
function start(){var mm=location.hash.match(/s(\d+)/);render();if(mm){show(Number(mm[1])-1)}}
if(location.protocol==='file:'){start();}else{fetch('data/projects.json?v='+Date.now()).then(function(r){return r.ok?r.json():DATA}).then(function(j){DATA=j;start();}).catch(start)}
</script>
