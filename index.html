<style>
:root{--bg:#0d0f12;--bg2:#14171c;--surface:#181c22;--surface2:#1f242b;--ink:#f2f4f6;--ink2:#c4cad2;--muted:#8b929c;--line:#2a2f37;--line2:#3a414b;--accent:#7cc4ff;--term:#0a0c0f;--good:#8fe08a;--warn:#ffc266;--font:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:var(--font);line-height:1.6}
h1,h2,h3,h4{margin:0;line-height:1.15;font-weight:800}p{margin:0;color:var(--ink2)}
.slide{min-height:100vh;padding:44px clamp(22px,4vw,60px) 96px;display:none;align-items:center}.slide.active{display:flex}.frame{width:min(1120px,100%);margin:0 auto}
.kicker{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line2);background:var(--surface);border-radius:999px;padding:7px 13px;color:var(--ink2);font-size:12px;font-weight:800;letter-spacing:.06em}.kicker:before{content:'';width:7px;height:7px;border-radius:99px;background:var(--accent)}
.phase{display:inline-block;margin-left:8px;padding:3px 9px;border-radius:7px;background:var(--surface2);border:1px solid var(--line2);color:var(--accent);font-size:12px;font-weight:800}
.cover h1{font-size:clamp(36px,5.5vw,68px);margin-top:20px;letter-spacing:-.03em}.cover .sub{font-size:clamp(17px,2vw,23px);margin-top:20px;color:var(--ink2);max-width:840px}.how{margin-top:26px;border-left:3px solid var(--accent);background:var(--surface);border-radius:0 12px 12px 0;padding:16px 20px;font-size:16px;color:var(--ink);max-width:880px}
.stitle{font-size:clamp(26px,3.6vw,44px);margin:12px 0 22px;letter-spacing:-.02em}
.grid{display:grid;gap:16px}.cols2{grid-template-columns:1fr 1fr}
.card{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:22px}.card h3{font-size:19px;margin-bottom:10px}
.legend{display:grid;gap:10px;margin-top:8px}.leg{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center;font-size:15px;color:var(--ink2)}.chip{text-align:center;border-radius:8px;padding:7px 8px;font-weight:800;font-size:13px}.chip.t{background:#0a1a10;color:var(--good);border:1px solid #1f5136}.chip.c{background:#0a1622;color:var(--accent);border:1px solid #1f4160}.chip.b{background:var(--surface2);color:var(--ink2);border:1px solid var(--line2)}
.big{font-size:clamp(20px,2.4vw,30px);font-weight:800;margin-bottom:18px;color:var(--ink)}
.cmd{border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:var(--term)}.cmd-head{display:flex;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--surface);font-size:12px;font-weight:800;letter-spacing:.08em}.cmd.terminal .cmd-head{color:var(--good)}.cmd.claude .cmd-head{color:var(--accent)}
pre{margin:0;padding:20px;white-space:pre-wrap;word-break:keep-all;color:var(--ink);font-family:'SFMono-Regular','Menlo',monospace;font-size:clamp(15px,1.7vw,19px);line-height:1.7}
.clicks{counter-reset:c;display:grid;gap:11px}.click{display:grid;grid-template-columns:34px 1fr;gap:13px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--surface);font-size:clamp(16px,1.8vw,20px);color:var(--ink)}.click:before{counter-increment:c;content:counter(c);width:26px;height:26px;border-radius:7px;background:var(--surface2);border:1px solid var(--line2);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:14px}
.checkbox{border:1px solid var(--good);background:rgba(143,224,138,.08);border-radius:16px;padding:22px}.checkbox .cmd{margin-top:12px}
.note{margin-top:16px;color:var(--muted);font-size:clamp(14px,1.5vw,17px);line-height:1.6}
.progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:20;transition:width .3s}
.nav{position:fixed;z-index:10;left:50%;bottom:18px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;border:1px solid var(--line2);background:rgba(13,15,18,.92);backdrop-filter:blur(12px);border-radius:999px;padding:8px}.nav button{border:1px solid var(--line2);background:var(--surface);color:var(--ink);border-radius:999px;padding:9px 15px;font-weight:700;cursor:pointer}.nav .primary{background:var(--accent);color:#08222f;border-color:var(--accent)}.counter{color:var(--muted);font-size:13px;min-width:70px;text-align:center}
a{color:var(--accent)}
@media(max-width:900px){.cols2{grid-template-columns:1fr}.leg{grid-template-columns:100px 1fr}.cover h1{font-size:34px}.stitle{font-size:26px}}
@media print{body{background:#fff;color:#111}.slide{display:flex;min-height:auto;page-break-after:always}.nav,.progress{display:none}.card,.cmd,.click,.checkbox{background:#fff;color:#111;border-color:#ccc}}
</style>

<script id="fallback-data" type="application/json">{"meta":{"title":"우리 결과물처럼 만드는 정확한 레시피","subtitle":"빈 폴더에서 시작해 Claude Code에 무엇을 넣어야 하는지, 파일 구조와 검수 기준까지 그대로 따라 하기","version":"1.1.0","lastUpdated":"2026-07-07","howToUse":"이 덱은 결과물별 제작 레시피입니다. 초록 박스는 터미널 입력, 파란 박스는 Claude Code 붙여넣기, 회색 단계는 GitHub에서 클릭할 순서입니다. “비슷한 것”이 아니라 지정한 파일구조와 검수 기준을 만족하는 결과물을 만드는 것이 목표입니다."},"prerequisites":{"title":"시작 전 준비","steps":[{"kind":"browser","title":"1) GitHub 계정 만들기","clicks":["github.com 접속","Sign up 클릭","가입 후 로그인","오른쪽 위 프로필 아이콘이 보이면 완료"],"note":"결과물을 올리고 배포할 계정입니다."},{"kind":"browser","title":"2) 터미널 열기","clicks":["Mac: Spotlight에서 터미널 검색","Windows: PowerShell 또는 Windows Terminal 실행","검은/파란 명령창이 뜨면 완료"],"note":"초록 박스 명령을 입력하는 곳입니다."},{"kind":"terminal","title":"3) Claude Code 설치","code":"npm install -g @anthropic-ai/claude-code","note":"안 되면 Node.js를 먼저 설치한 뒤 다시 실행하세요."},{"kind":"terminal","title":"4) Claude Code 로그인 확인","code":"claude","note":"로그인 화면이 나오면 로그인. Claude 입력창이 뜨면 준비 완료입니다."}]},"projects":[{"id":"auction-mbti","title":"auction_mbti 정확히 만드는 법","kind":"진단형 웹앱","liveUrl":"https://friscomike94.github.io/auction_mbti/","whatItIs":"매매/경매 투자성향 질문에 답하면 유형 코드와 결과 프로필이 나오는 단일 HTML 웹앱입니다. 핵심은 질문이 아니라 DATA 구조, 채점 함수, 결과 프로필 매칭입니다.","manual":[{"phase":"목표 확인","kind":"info","title":"0. 완성 스펙","code":"완성 결과물:\n- index.html 하나로 작동하는 웹앱\n- 첫 화면: 매매 트랙 / 경매 트랙 선택\n- 매매 트랙: 4축, 16유형\n- 경매 트랙: 3축, 8유형\n- 질문 화면: 2지선다 카드\n- 결과 화면: 유형코드, 유형명, 강점, 약점, 맹점, 활용가이드\n- GitHub Pages로 공개","note":"이 스펙을 먼저 Claude에게 고정시켜야 결과가 흔들리지 않습니다."},{"phase":"폴더 준비","kind":"terminal","title":"1. 빈 폴더 만들기","code":"mkdir auction_mbti\ncd auction_mbti\nmkdir _workspace\nclaude","note":"_workspace는 중간 산출물을 저장하는 폴더입니다."},{"phase":"설계","kind":"claude","title":"2. 프로젝트 전체 설계 고정","code":"우리는 부동산 투자성향 MBTI 웹앱을 만들 거야.\n중요: 바로 index.html 만들지 마. 먼저 파일 구조와 제작 순서를 PLAN.md로 저장해.\n\n완성 스펙:\n1. index.html 하나로 작동\n2. 매매 트랙 4축 16유형\n3. 경매 트랙 3축 8유형\n4. 질문은 2지선다\n5. 결과는 유형코드/유형명/강점/약점/맹점/활용가이드\n6. 중간 산출물은 _workspace에 저장\n\nPLAN.md에는 다음 파일을 반드시 포함해:\n- _workspace/01_typology.md\n- _workspace/02_questions.json\n- _workspace/02_scoring.md\n- _workspace/03_profiles.md\n- _workspace/99_qa_report.md\n- index.html","note":"처음부터 최종 파일을 만들지 않고, 제작 순서를 먼저 고정합니다."},{"phase":"설계","kind":"claude","title":"3. 유형 축 만들기","code":"PLAN.md 기준으로 1단계만 진행해.\n_workspace/01_typology.md 를 만들어줘.\n\n조건:\n- 매매 트랙: RISK, HORIZON, BASIS, CAPITAL 4축\n- 경매 트랙: FUND, DIFFICULTY, REGION 3축\n- 각 축은 두 극을 가진다\n- 각 극은 코드 1글자\n- 매매 유형코드 예: M-SHRG 형태\n- 경매 유형코드 예: A-scn 형태\n- 각 축마다 \"왜 이 축이 필요한지\"와 \"질문으로 어떻게 구분할지\"를 써줘.","note":"우리 결과물의 뼈대입니다. 이 파일이 흔들리면 전체가 흔들립니다."},{"phase":"데이터","kind":"claude","title":"4. 질문 JSON 만들기","code":"01_typology.md를 읽고 _workspace/02_questions.json 을 만들어줘.\n\nJSON 구조는 반드시 이렇게 해:\n{\n  \"maemae\": {\n    \"axis_order\": [...],\n    \"axes\": [...],\n    \"questions\": [...]\n  },\n  \"gyeongmae\": {\n    \"axis_order\": [...],\n    \"axes\": [...],\n    \"profile_inputs\": [...],\n    \"questions\": [...]\n  }\n}\n\n조건:\n- 각 질문은 id, axis, text, options를 가진다\n- options는 label과 score를 가진다\n- score는 극 코드에 점수를 더하는 객체다\n- 경매 트랙은 PURPOSE 축을 만들지 않는다\n- JSON 문법 오류가 없게 만들어줘.","note":"웹앱이 흔들리지 않으려면 질문을 문장으로만 쓰면 안 되고 JSON 데이터로 만들어야 합니다."},{"phase":"데이터","kind":"claude","title":"5. 채점 규칙 문서 만들기","code":"02_questions.json을 기준으로 _workspace/02_scoring.md 를 만들어줘.\n\n포함할 내용:\n1. 답변 score를 합산하는 방식\n2. 축별로 어느 극이 이겼는지 판단하는 방식\n3. 동점일 때 default_pole을 쓰는 방식\n4. 유형코드 조립 방식\n5. 매매/경매 예시 답변 2개와 예상 유형코드","note":"나중에 index.html의 JS가 이 문서를 그대로 재현해야 합니다."},{"phase":"콘텐츠","kind":"claude","title":"6. 결과 프로필 만들기","code":"01_typology.md와 02_scoring.md를 읽고 _workspace/03_profiles.md 를 만들어줘.\n\n조건:\n- 매매 16유형, 경매 8유형 모두 포함\n- 각 유형마다 name, keywords, summary, strength, weakness, blindspot, guide를 작성\n- 유형코드는 02_scoring.md와 100% 일치해야 함\n- 내용은 초보자가 읽어도 이해되는 문장으로 작성","note":"결과 화면의 본문입니다. 유형코드가 조금이라도 틀리면 결과 매칭이 깨집니다."},{"phase":"조립","kind":"claude","title":"7. index.html 만들기","code":"이제 _workspace/02_questions.json, _workspace/02_scoring.md, _workspace/03_profiles.md 를 읽고 index.html 하나로 조립해줘.\n\n필수 구현:\n1. const DATA = {...}\n2. const PROFILES = {...}\n3. scoreTrack(data, answers, profileAnswers) 함수\n4. 시작 화면: 매매/경매 선택\n5. 질문 화면: 진행률 + 선택지 카드\n6. 결과 화면: 유형코드, 유형명, 키워드, 강점/약점/맹점/가이드\n7. \"다시 하기\" 버튼\n\n주의:\n- 외부 빌드도구 없이 index.html만 열면 작동해야 함\n- 모바일보다 강의 화면 16:9에서 보기 좋게\n- 디자인은 기본 다크 UI 정도만, 특정 폰트/브랜드 의존 금지","note":"여기서 처음으로 최종 웹앱을 만듭니다."},{"phase":"검수","kind":"claude","title":"8. QA 보고서 만들기","code":"index.html을 검수하고 _workspace/99_qa_report.md 를 만들어줘.\n\n검수 항목:\n1. 02_questions.json의 모든 질문이 화면에 나오는가\n2. 매매 유형코드가 16개 모두 PROFILES에 있는가\n3. 경매 유형코드가 8개 모두 PROFILES에 있는가\n4. scoreTrack 결과가 02_scoring.md 예시와 일치하는가\n5. index.html 안에 오래된 축/유형 설명이 남아 있지 않은가\n6. 브라우저에서 열었을 때 콘솔 오류가 없는가\n\n문제가 있으면 바로 수정하고 보고서에 남겨줘.","note":"이 단계가 없으면 “겉보기만 되는 앱”이 됩니다."},{"phase":"확인","kind":"terminal","title":"9. 브라우저로 확인","code":"open index.html","note":"직접 질문을 끝까지 눌러 결과가 나오는지 확인합니다."},{"phase":"깃허브","kind":"browser","title":"10. GitHub 저장소 만들기","clicks":["github.com 로그인","오른쪽 위 + 클릭","New repository 클릭","Repository name: auction_mbti","Public 선택","Create repository 클릭"],"note":"이름은 원하는 대로 바꿔도 되지만, Pages 주소도 같이 바뀝니다."},{"phase":"깃허브","kind":"browser","title":"11. 파일 업로드","clicks":["저장소 첫 화면에서 uploading an existing file 클릭","index.html, README.md, _workspace 폴더를 드래그","Commit message 입력","Commit changes 클릭"],"note":"최소 index.html은 꼭 올려야 Pages가 뜹니다."},{"phase":"배포","kind":"browser","title":"12. GitHub Pages 켜기","clicks":["Settings 클릭","왼쪽 Pages 클릭","Source: Deploy from a branch","Branch: main / (root)","Save 클릭"],"note":"1~2분 뒤 주소가 생깁니다."},{"phase":"완성","kind":"check","title":"13. 완성 주소 확인","code":"https://\u003c내아이디>.github.io/auction_mbti/","note":"이 주소가 열리면 완성입니다."}]},{"id":"auction-crwal0629","title":"auction_crawl 정확히 만드는 법","kind":"법원경매 수집기 + 대시보드","liveUrl":"https://friscomike94.github.io/auction-crwal0629/","whatItIs":"법원경매 사이트에서 물건 목록을 수집해 CSV로 저장하고, docs/index.html 대시보드로 공개합니다. 핵심은 사이트 차단을 뚫는 시행착오를 기록하는 것입니다.","manual":[{"phase":"목표 확인","kind":"info","title":"0. 완성 스펙","code":"완성 결과물:\n- scrape_uijeongbu_apt.py: CLI로 실행하는 스크래퍼\n- auction_list.csv: 수집 결과\n- templates/*.json: 자주 쓰는 검색 조건\n- skill/SKILL.md: 성공/실패 패턴 문서\n- skill/references/trial-and-error.md: 시행착오 기록\n- docs/index.html: CSV를 보여주는 대시보드\n- GitHub Pages: docs 폴더 공개","note":"이 프로젝트는 \"한 번에 완성\"이 아니라 \"막히는 걸 뚫고 기록\"하는 구조입니다."},{"phase":"폴더 준비","kind":"terminal","title":"1. 빈 폴더 만들기","code":"mkdir auction_crawl\ncd auction_crawl\nmkdir -p skill/references templates docs\nclaude","note":"처음부터 skill, templates, docs 폴더를 만들어 둡니다."},{"phase":"설계","kind":"claude","title":"2. 조사 계획부터 만들기","code":"법원경매 사이트(courtauction.go.kr)에서 경매 물건 목록을 수집하는 도구를 만들 거야.\n바로 코드 만들지 말고 PLAN.md를 먼저 작성해줘.\n\nPLAN.md에는 다음을 포함해:\n1. 수집할 컬럼: 사건번호, 소재지, 감정가, 최저가, 유찰횟수\n2. 예상되는 차단/실패 가능성\n3. 시도 순서: requests → Playwright → 스텔스 옵션\n4. 성공하면 만들 파일 구조\n5. 실패 기록을 trial-and-error.md에 남기는 방식","note":"크롤러는 먼저 조사 계획과 실패 가능성을 세웁니다."},{"phase":"시도","kind":"claude","title":"3. 1차 수집 시도와 실패 기록","code":"PLAN.md 기준으로 1차 수집을 시도해줘.\n일반 requests 방식이 실패하면 그 실패 원인을 skill/references/trial-and-error.md에 기록해줘.\n그다음 Playwright 방식으로 넘어가.","note":"실패를 숨기지 말고 파일로 기록하게 합니다."},{"phase":"시도","kind":"claude","title":"4. Playwright 스텔스 패턴 만들기","code":"Playwright로 다시 시도해줘.\n조건:\n- headless 감지 우회를 위해 --disable-blink-features=AutomationControlled 사용\n- navigator.webdriver 제거\n- 버튼 클릭은 page.click이 아니라 page.evaluate JS 클릭도 시도\n- WebSquare 초기화 대기는 고정 sleep보다 wait_for_function 사용\n성공/실패를 trial-and-error.md에 계속 기록해줘.","note":"우리 결과물의 핵심 노하우입니다."},{"phase":"코드","kind":"claude","title":"5. 메인 스크래퍼 파일 만들기","code":"작동한 패턴을 기준으로 scrape_uijeongbu_apt.py를 만들어줘.\n\n필수 기능:\n- argparse로 --court, --sido, --sgg, --lcl, --mcl, --scl, --flbd-min, -o 옵션 지원\n- 기본값: 의정부지방법원 / 아파트 / 유찰 1회 이상\n- 결과 CSV 컬럼: 사건번호, 물건소재지, 감정가, 최저가, 유찰횟수\n- 실행 후 auction_list.csv 저장\n- 에러가 나면 원인을 설명하는 로그 출력","note":"CLI 옵션이 있어야 강의에서 조건을 바꿔 보여줄 수 있습니다."},{"phase":"코드","kind":"claude","title":"6. 템플릿 JSON 만들기","code":"자주 쓰는 검색 조건을 templates 폴더에 JSON으로 만들어줘.\n최소 3개:\n- templates/uijeongbu_apt.json\n- templates/uijeongbu_yangju_apt.json\n- templates/nambu_geumcheon_dasedae.json\n그리고 scrape_uijeongbu_apt.py가 -t 옵션으로 템플릿을 읽게 해줘.","note":"템플릿이 있어야 초보자가 긴 옵션을 매번 안 쳐도 됩니다."},{"phase":"문서화","kind":"claude","title":"7. 스킬 문서로 박제","code":"지금까지 성공한 방법과 실패한 방법을 skill/SKILL.md로 정리해줘.\n포함할 것:\n1. 이 스킬이 필요한 이유\n2. 절대 하지 말 것: requests 직접 호출, 기본 headless, 고정 sleep만 믿기\n3. 올바른 접근: Playwright 스텔스, wait_for_function, JS 클릭, 파이프라인 플러시\n4. CSV 컬럼 매핑\n5. 자주 나는 오류와 해결책","note":"한 번 뚫은 방법을 스킬로 남겨야 다음번에 재현됩니다."},{"phase":"확인","kind":"terminal","title":"8. 수집 실행","code":"python3 -m pip install playwright pandas\npython3 -m playwright install chromium\npython3 scrape_uijeongbu_apt.py -t templates/uijeongbu_apt.json","note":"CSV가 생성되는지 확인합니다."},{"phase":"대시보드","kind":"claude","title":"9. CSV 대시보드 만들기","code":"auction_list.csv를 읽어 보여주는 docs/index.html 대시보드를 만들어줘.\n필수 구성:\n- 상단 KPI 카드: 총 물건 수, 평균 최저가율, 평균 유찰횟수, 관심지역 수\n- 중간: 주목 물건 3개\n- 하단: 전체 테이블\n- 외부 빌드 없이 docs/index.html 하나로 작동","note":"GitHub Pages에서 docs 폴더로 배포할 수 있게 만듭니다."},{"phase":"확인","kind":"terminal","title":"10. 대시보드 확인","code":"open docs/index.html","note":"KPI 카드와 테이블이 보이면 성공입니다."},{"phase":"깃허브","kind":"browser","title":"11. GitHub 저장소 만들기","clicks":["github.com 로그인","+ → New repository","Repository name: auction_crawl","Public 선택","Create repository 클릭"],"note":""},{"phase":"깃허브","kind":"browser","title":"12. 파일 업로드","clicks":["Add file → Upload files","scrape_uijeongbu_apt.py, templates, skill, docs, auction_list.csv 업로드","Commit changes 클릭"],"note":"skill 폴더를 반드시 같이 올려야 합니다."},{"phase":"배포","kind":"browser","title":"13. Pages 배포 (/docs)","clicks":["Settings → Pages","Deploy from a branch","Branch: main / docs 선택","Save 클릭"],"note":"대시보드는 docs/index.html이므로 /docs를 고릅니다."},{"phase":"완성","kind":"check","title":"14. 완성 주소 확인","code":"https://\u003c내아이디>.github.io/auction_crawl/","note":"대시보드가 열리면 완성입니다."}]},{"id":"malso-standard-rights-deck","title":"malso_deck 정확히 만드는 법","kind":"HTML 강의덱","liveUrl":"https://friscomike94.github.io/malso-standard-rights-deck/","whatItIs":"PPT 없이 HTML 한 파일로 넘겨보는 강의 슬라이드를 만듭니다. 가장 단순한 단일 파일 결과물입니다.","manual":[{"phase":"목표 확인","kind":"info","title":"0. 완성 스펙","code":"완성 결과물:\n- index.html 하나\n- 16:9 슬라이드\n- 좌우 버튼 + 키보드 화살표 이동\n- 총 10장\n- 각 장: 제목, 핵심문장, 예시/주의점\n- GitHub Pages 공개","note":"단발성 강의자료라 하네스 없이 단일 파일로 끝냅니다."},{"phase":"폴더 준비","kind":"terminal","title":"1. 빈 폴더 만들기","code":"mkdir malso_deck\ncd malso_deck\nclaude","note":""},{"phase":"기획","kind":"claude","title":"2. 강의 목차 만들기","code":"말소기준권리를 처음 배우는 사람을 위한 강의 슬라이드를 만들 거야.\n바로 HTML 만들지 말고 SLIDE_PLAN.md를 먼저 만들어줘.\n\n조건:\n- 총 10장\n- 각 장에 제목, 핵심문장, 예시, 강의자가 말할 포인트\n- 초보자가 헷갈리는 부분을 먼저 설명\n- 마지막 장은 체크리스트","note":"덱은 HTML보다 목차가 먼저입니다."},{"phase":"제작","kind":"claude","title":"3. HTML 슬라이드 만들기","code":"SLIDE_PLAN.md 기준으로 index.html을 만들어줘.\n필수 기능:\n- 16:9 슬라이드 카드\n- 좌우 버튼\n- 키보드 ArrowLeft/ArrowRight 이동\n- 현재 페이지 번호\n- 모든 내용을 index.html 하나에 포함\n- 외부 빌드도구 필요 없음","note":"HTML 한 파일로 완성합니다."},{"phase":"검수","kind":"claude","title":"4. 넘침 검수","code":"index.html의 각 슬라이드가 16:9 화면에서 넘치지 않는지 점검해줘.\n문장이 너무 길면 줄이고, 글자가 너무 작으면 키워드를 줄여줘.\n수정한 슬라이드를 요약해줘.","note":"강의용은 내용이 넘치면 실패입니다."},{"phase":"확인","kind":"terminal","title":"5. 브라우저 확인","code":"open index.html","note":"좌우 버튼과 키보드가 작동하면 성공."},{"phase":"깃허브","kind":"browser","title":"6. GitHub 저장소 만들기","clicks":["github.com 로그인","+ → New repository","Repository name: malso_deck","Public 선택","Create repository 클릭"],"note":""},{"phase":"깃허브","kind":"browser","title":"7. index.html 업로드","clicks":["uploading an existing file 클릭","index.html 드래그","Commit changes 클릭"],"note":"파일 하나만 있으면 됩니다."},{"phase":"배포","kind":"browser","title":"8. Pages 배포","clicks":["Settings → Pages","Branch: main / (root)","Save 클릭"],"note":""},{"phase":"완성","kind":"check","title":"9. 완성 주소 확인","code":"https://\u003c내아이디>.github.io/malso_deck/","note":""}]},{"id":"apt-all-in-one","title":"apt_report 정확히 만드는 법","kind":"실거래 분석 리포트","liveUrl":"","whatItIs":"공공데이터포털 API 키로 국토부 실거래 데이터를 수집하고, 분석 결과를 HTML 리포트로 만듭니다. API 키가 0단계입니다.","manual":[{"phase":"목표 확인","kind":"info","title":"0. 완성 스펙","code":"완성 결과물:\n- .env: PUBLIC_DATA_SERVICE_KEY 저장\n- scripts/setup.sh\n- scripts/collect.py: sale.csv/rent.csv 수집\n- scripts/analyze.py: insights.json 생성\n- scripts/build_report.py: report.html 생성\n- references/gotchas.md\n- Private GitHub 저장소(권장)","note":"외부 API 프로젝트라 키와 보안이 중요합니다."},{"phase":"API 준비","kind":"browser","title":"1. 공공데이터 API 키 발급","clicks":["data.go.kr 가입/로그인","국토교통부 아파트 매매 실거래가 검색","활용신청","일반 인증키(Decoding) 복사"],"note":"이 키가 없으면 데이터를 받을 수 없습니다."},{"phase":"폴더 준비","kind":"terminal","title":"2. 폴더와 .env 만들기","code":"mkdir apt_report\ncd apt_report\nmkdir scripts references\necho \"PUBLIC_DATA_SERVICE_KEY=여기에_복사한_키\" > .env\nclaude","note":".env는 GitHub에 올리면 안 됩니다."},{"phase":"설계","kind":"claude","title":"3. 리포트 파이프라인 설계","code":"국토부 실거래가 API로 아파트 실거래 분석 리포트를 만들 거야.\n바로 코드 만들지 말고 PLAN.md를 작성해줘.\n\n필수 파일:\n- scripts/setup.sh\n- scripts/collect.py\n- scripts/analyze.py\n- scripts/build_report.py\n- references/gotchas.md\n\n흐름은 수집 → 분석 → 리포트야. 인증키는 .env에서 읽어.","note":"먼저 파이프라인을 고정합니다."},{"phase":"수집","kind":"claude","title":"4. collect.py 만들기","code":"PLAN.md 기준으로 scripts/collect.py를 만들어줘.\n조건:\n- .env의 PUBLIC_DATA_SERVICE_KEY를 읽기\n- district, years, workdir 인자 받기\n- 매매는 sale.csv, 전월세는 rent.csv로 저장\n- 데이터가 없거나 API 오류가 나면 이유를 설명\n- 필요한 설치 명령도 scripts/setup.sh로 만들어줘","note":"수집 스크립트가 첫 번째 핵심입니다."},{"phase":"분석","kind":"claude","title":"5. analyze.py 만들기","code":"sale.csv와 rent.csv를 읽어 분석하는 scripts/analyze.py를 만들어줘.\n출력은 insights.json.\n포함 지표:\n- 월별 평당가 중앙값\n- 거래량\n- 전세가율\n- 갭 작은 단지 랭킹\n- 최근 6개월 흐름 요약","note":"분석 결과를 JSON으로 만들어야 리포트가 안정적으로 생성됩니다."},{"phase":"리포트","kind":"claude","title":"6. build_report.py 만들기","code":"insights.json을 읽어 report.html을 만드는 scripts/build_report.py를 만들어줘.\n조건:\n- HTML 한 파일 생성\n- 상단 핵심 요약 카드\n- 가격 흐름 섹션\n- 전세가율/갭 섹션\n- 초보자가 읽기 쉬운 해석 문장\n- 외부 빌드도구 없이 열리게","note":"마지막 산출물은 report.html입니다."},{"phase":"함정 기록","kind":"claude","title":"7. gotchas.md 만들기","code":"이번 프로젝트에서 조심해야 할 점을 references/gotchas.md에 정리해줘.\n반드시 포함:\n- API 키를 채팅에 붙여넣지 말 것\n- .env를 GitHub에 올리지 말 것\n- 당월 데이터는 적을 수 있음\n- 평균보다 중앙값을 우선 볼 것\n- 데이터 수가 적으면 과해석하지 말 것","note":"초보자가 같은 실수를 반복하지 않게 합니다."},{"phase":"확인","kind":"terminal","title":"8. 실행해서 리포트 만들기","code":"bash scripts/setup.sh\npython scripts/collect.py --district 강남구 --years 5 --workdir realprice_강남구\npython scripts/analyze.py --workdir realprice_강남구\npython scripts/build_report.py --workdir realprice_강남구\nopen realprice_강남구/report.html","note":"리포트가 열리면 성공입니다."},{"phase":"깃허브","kind":"browser","title":"9. Private 저장소 만들기","clicks":["github.com 로그인","+ → New repository","Repository name: apt_report","Private 선택","Create repository 클릭"],"note":"키와 데이터가 있으니 Private 권장."},{"phase":"깃허브","kind":"browser","title":"10. 파일 업로드 (.env 제외)","clicks":["Add file → Upload files","scripts, references, report.html 업로드",".env 파일은 절대 업로드 금지","Commit changes 클릭"],"note":"인증키 유출 방지."},{"phase":"완성","kind":"check","title":"11. 완성","code":"Private repo 안에서 report.html 확인","note":"공개 주소는 없습니다. 공유하려면 preview HTML만 별도로 공개해야 합니다."}]}]}</script>
<script>
var DATA = JSON.parse(document.getElementById('fallback-data').textContent);
var slides=[]; var current=0;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slide(html){var s=document.createElement('section');s.className='slide';s.innerHTML='<div class="frame">'+html+'</div>';slides.push(s);document.getElementById('deck').appendChild(s);}
function clicks(arr){return '<div class="clicks">'+(arr||[]).map(function(x){return '<div class="click">'+esc(x)+'</div>';}).join('')+'</div>';}
function cmd(kind,code){var lbl=kind==='terminal'?'터미널에 입력':'Claude Code에 붙여넣기';var cls=kind==='terminal'?'terminal':'claude';return '<div class="cmd '+cls+'"><div class="cmd-head"><span>'+lbl+'</span></div><pre>'+esc(code)+'</pre></div>';}
function stepBody(st){
  if(st.kind==='terminal') return cmd('terminal', st.code);
  if(st.kind==='claude') return cmd('claude', st.code);
  if(st.kind==='browser') return clicks(st.clicks);
  if(st.kind==='check') return '<div class="checkbox"><div class="big">완성 확인</div>'+cmd('terminal', st.code)+'</div>';
  return '<div class="card"><p>'+esc(st.code||'')+'</p></div>';
}
function render(){var m=DATA.meta;document.getElementById('deck').innerHTML='';slides=[];
slide('<div class="cover"><span class="kicker">따라 하는 설명서</span><h1>'+esc(m.title)+'</h1><p class="sub">'+esc(m.subtitle)+'</p><div class="how">'+esc(m.howToUse)+'</div></div>');
slide('<span class="kicker">읽는 법</span><h2 class="stitle">3가지 박스만 기억하세요</h2><div class="card"><div class="legend"><div class="leg"><span class="chip t">터미널</span><span>초록 박스 = 검은 터미널 창에 그대로 입력하고 Enter</span></div><div class="leg"><span class="chip c">Claude Code</span><span>파란 박스 = Claude Code 창에 그대로 붙여넣기</span></div><div class="leg"><span class="chip b">화면 클릭</span><span>회색 단계 = 웹사이트에서 순서대로 눌러야 할 것</span></div></div></div>');
var pq=DATA.prerequisites;slide('<span class="kicker">시작 전 준비</span><h2 class="stitle">'+esc(pq.title)+'</h2><div class="grid cols2">'+(pq.steps||[]).map(function(st){return '<div class="card"><h3>'+esc(st.title)+'</h3>'+(st.kind==='terminal'?cmd('terminal',st.code):clicks(st.clicks))+'<p class="note">'+esc(st.note||'')+'</p></div>';}).join('')+'</div>');
DATA.projects.forEach(function(x,i){var n=String(i+1).padStart(2,'0');var total=x.manual.length;
slide('<span class="kicker">CASE '+n+'</span><h2 class="stitle">'+esc(x.title)+'</h2><div class="grid cols2"><div class="card"><h3>무엇을 만드나</h3><p style="font-size:18px;color:var(--ink)">'+esc(x.whatItIs)+'</p>'+(x.liveUrl?'<p class="note">완성 예시: <a href="'+esc(x.liveUrl)+'" target="_blank">'+esc(x.liveUrl)+'</a></p>':'')+'</div><div class="card"><h3>이 케이스는 총 '+total+'단계</h3><p>아래 슬라이드를 순서대로 따라 하면, 빈 폴더에서 시작해 완성까지 갑니다.</p><p class="note">초록=터미널, 파랑=Claude Code, 회색=화면 클릭</p></div></div>');
x.manual.forEach(function(st,si){slide('<span class="kicker">CASE '+n+' · '+(si+1)+'/'+total+'<span class="phase">'+esc(st.phase)+'</span></span><h2 class="stitle">'+esc(st.title)+'</h2>'+stepBody(st)+'<p class="note">'+esc(st.note||'')+'</p>');});
});
slide('<span class="kicker">끝</span><h2 class="stitle">순서만 지키면 누구나 만듭니다</h2><div class="card"><div class="legend"><div class="leg"><span class="chip b">1</span><span>빈 폴더 만들기 → Claude Code 켜기</span></div><div class="leg"><span class="chip b">2</span><span>한 번에 만들지 말고 단계로 시키기</span></div><div class="leg"><span class="chip b">3</span><span>내 컴퓨터에서 열어 확인</span></div><div class="leg"><span class="chip b">4</span><span>GitHub에 업로드 → Pages로 공개</span></div></div></div>');
show(0);}
function show(i){current=Math.max(0,Math.min(i,slides.length-1));slides.forEach(function(s,k){s.classList.toggle('active',k===current);});document.getElementById('count').textContent=(current+1)+' / '+slides.length;document.getElementById('prog').style.width=((current+1)/slides.length*100)+'%';location.hash='s'+(current+1);}
document.getElementById('prev').onclick=function(){show(current-1)};document.getElementById('next').onclick=function(){show(current+1)};
window.onkeydown=function(e){if(e.key==='ArrowRight'||e.key===' '){show(current+1)}if(e.key==='ArrowLeft'){show(current-1)}};
function start(){var mm=location.hash.match(/s(\d+)/);render();if(mm){show(Number(mm[1])-1)}}
if(location.protocol==='file:'){start();}else{fetch('data/projects.json?v='+Date.now()).then(function(r){return r.ok?r.json():DATA}).then(function(j){DATA=j;start();}).catch(start)}
</script>
