<style>
:root{--bg-0:#0b0b0d;--bg-1:#141417;--surface:rgba(255,255,255,.035);--surface-2:rgba(255,255,255,.06);--ink:#f4f4f2;--ink-2:#d9d9d4;--muted:rgba(230,230,225,.58);--line:rgba(255,255,255,.1);--line-strong:rgba(255,255,255,.18);--lime:#c8fa46;--lime-2:#a6e800;--lime-soft:rgba(200,250,70,.12);--lime-line:rgba(200,250,70,.4);--heading:'Gilroy','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--body:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% -4%,rgba(200,250,70,.06),transparent 42%),linear-gradient(180deg,var(--bg-0),var(--bg-1));color:var(--ink);font-family:var(--body);letter-spacing:-.025em}body:before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(210,255,60,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(210,255,60,.045) 1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.6),transparent 88%)}h1,h2,h3{font-family:var(--heading);letter-spacing:-.055em;line-height:1.05;margin:0}p{line-height:1.7;color:var(--ink-2)}a{color:var(--lime)}.slide{position:relative;z-index:1;min-height:100vh;padding:56px clamp(22px,4vw,64px) 110px;display:none;align-items:center}.slide.active{display:flex}.frame{width:min(1180px,100%);margin:0 auto}.kicker{display:inline-flex;gap:10px;align-items:center;border:1px solid var(--lime-line);background:var(--lime-soft);border-radius:999px;padding:8px 14px;color:var(--ink-2);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.kicker:before{content:'';width:8px;height:8px;border-radius:99px;background:var(--lime);box-shadow:0 0 14px var(--lime)}.hero h1{font-size:clamp(46px,7vw,92px);max-width:980px;margin-top:24px}.hero em,.lime{font-style:normal;background:linear-gradient(100deg,var(--lime),var(--lime-2));-webkit-background-clip:text;color:transparent}.subtitle{font-size:clamp(18px,2vw,24px);max-width:780px;margin-top:24px;color:var(--ink-2)}.title{font-size:clamp(34px,5vw,64px);margin:20px 0 26px}.grid{display:grid;gap:18px}.cols2{grid-template-columns:1fr 1fr}.cols4{grid-template-columns:repeat(4,1fr)}.card{border:1px solid var(--line);background:var(--surface);border-radius:24px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.38)}.strong{border-color:var(--lime-line);background:rgba(200,250,70,.06)}.badge{display:inline-flex;border:1px solid var(--line-strong);background:var(--surface-2);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:12px}.code{font-family:var(--heading);font-size:clamp(38px,6vw,72px);color:var(--lime);letter-spacing:-.06em}.lead{font-size:22px}.screen{aspect-ratio:16/9;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));display:flex;align-items:center;justify-content:center;color:var(--muted)}.screen img{width:100%;height:100%;object-fit:cover}.placeholder{text-align:center;padding:32px}.placeholder b{display:block;color:var(--lime);font-size:22px;margin-bottom:8px}.steps{counter-reset:item;display:grid;gap:12px}.step{display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:start;border:1px solid var(--line);border-radius:16px;padding:14px;background:var(--surface)}.step:before{counter-increment:item;content:counter(item);width:32px;height:32px;border-radius:99px;background:var(--lime);color:#101206;display:grid;place-items:center;font-weight:900}.prompt{white-space:pre-wrap;background:#08090a;border:1px solid var(--lime-line);border-radius:18px;padding:22px;color:var(--ink-2);line-height:1.7;font-size:17px}.prompt:before{content:'CLAUDE PROMPT';display:block;color:var(--lime);font-size:12px;font-weight:900;letter-spacing:.14em;margin-bottom:12px}.nav{position:fixed;z-index:10;left:50%;bottom:22px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:rgba(15,15,17,.82);backdrop-filter:blur(14px);border-radius:999px;padding:10px}.nav button{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:999px;padding:10px 16px;font-weight:800;cursor:pointer}.nav .primary{background:var(--lime);color:#101206}.counter{color:var(--muted);font-size:13px;min-width:70px;text-align:center}.small{font-size:14px;color:var(--muted)}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:14px;text-align:left;vertical-align:top}.table th{color:var(--lime);font-size:12px;letter-spacing:.1em;text-transform:uppercase}.table td{color:var(--ink-2)}@media(max-width:860px){.cols2,.cols4{grid-template-columns:1fr}.hero h1{font-size:44px}.title{font-size:36px}}@media print{body{background:#fff;color:#111}.slide{display:flex;min-height:auto;page-break-after:always}.nav{display:none}.card,.screen,.step{box-shadow:none;background:#fff;color:#111;border-color:#ddd}}

로 나눈다.","각 슬라이드의 핵심 문장과 예시를 쓴다.","Claude에게 HTML 슬라이드 덱으로 변환시킨다.","16:9 비율과 글자 넘침을 확인한다.","index.html로 GitHub Pages에 배포한다.","강의 녹화 전 화면비와 글자 크기를 점검한다."],"clickGuide":["Claude에 강의 주제 입력","10장 슬라이드 목차 요청","HTML 한 파일로 만들어달라고 요청","GitHub 새 repo 또는 기존 repo에 index.html 업로드","Settings → Pages 배포 확인"],"claudePrompt":"말소기준권리를 처음 배우는 사람을 위한 10장짜리 강의덱을 만들어줘. 각 슬라이드는 제목, 핵심 설명, 예시, 주의점을 포함하고 HTML 한 파일로 만들어줘. 좌우 버튼과 키보드 화살표로 넘길 수 있게 해줘.","teachingPoint":"PPT를 먼저 만들 필요 없다. Claude에게 원고 구조를 주면 HTML 슬라이드 덱부터 만들 수 있다."}]}</script>
<script>
var DATA = JSON.parse(document.getElementById('fallback-data').textContent);
var slides = []; var current = 0;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slide(html){var sec=document.createElement('section');sec.className='slide';sec.innerHTML='<div class="frame">'+html+'</div>';slides.push(sec);document.getElementById('deck').appendChild(sec);}
function stepList(arr){return '<div class="steps">'+(arr||[]).map(function(x){return '<div class="step">'+esc(x)+'</div>';}).join('')+'</div>';}
function screenShot(p){var s=(p.screenshots&&p.screenshots[0])||{};if(!s.file){return '<div class="screen"><div class="placeholder"><b>SCREEN CAPTURE</b><span>'+esc(p.title)+'</span></div></div>';}return '<div class="screen"><img src="assets/screenshots/'+esc(s.file)+'" alt="'+esc(s.label||p.title)+'"></div><p class="small">'+esc(s.label||p.title)+' · '+esc(s.note||'')+'</p>';}
function render(){var p=DATA.projects;document.getElementById('deck').innerHTML='';slides=[];slide('<div class="hero"><span class="kicker">'+esc(DATA.meta.design)+' · GitHub Pages Workshop</span><h1>Claude로<br><em>부동산 AI 결과물</em> 만들기</h1><p class="subtitle">AI 초보도 따라 하는 기획 → Claude 제작 → GitHub 업로드 → Pages 배포 실습</p></div>');slide('<span class="kicker">오늘 만들 결과물</span><h2 class="title">4가지 제작 패턴을 익히면<br>새 결과물도 계속 추가할 수 있습니다</h2><div class="grid cols4">'+p.map(function(x){return '<div class="card"><span class="badge">'+esc(x.kind)+'</span><h3>'+esc(x.title)+'</h3><p>'+esc(x.oneLine)+'</p><p class="small">'+esc(x.repo)+'</p></div>';}).join('')+'</div>');slide('<span class="kicker">초보자 공식</span><h2 class="title">Claude에게 한 번에 “다 만들어줘” 하지 않습니다</h2><div class="grid cols2"><div class="card strong"><div class="code">5 STEP</div><p class="lead">구조 설계 → 화면 설계 → 코드 생성 → GitHub 업로드 → 수정 반복</p></div><div class="card">'+stepList(['완성 화면을 먼저 말한다','필요 파일을 물어본다','Claude에게 한 파일씩 만들게 한다','GitHub에 올리고 Pages로 확인한다','화면을 보며 수정 요청한다'])+'</div></div>');slide('<span class="kicker">비교표</span><h2 class="title">결과물별로 Claude에게 시키는 일이 다릅니다</h2><table class="table"><thead><tr><th>결과물</th><th>제작 패턴</th><th>최종 파일</th><th>핵심 학습</th></tr></thead><tbody>'+p.map(function(x){return '<tr><td>'+esc(x.title)+'<br><span class="small">'+esc(x.repo)+'</span></td><td>'+esc(x.kind)+'</td><td>'+esc((x.outputFiles||[]).join(', '))+'</td><td>'+esc(x.teachingPoint)+'</td></tr>';}).join('')+'</tbody></table>');p.forEach(function(x,i){var n=String(i+1).padStart(2,'0');slide('<span class="kicker">CASE '+n+' · '+esc(x.kind)+'</span><h2 class="title">'+esc(x.title)+'</h2><div class="grid cols2"><div>'+screenShot(x)+'<p class="small">'+esc(x.visibility)+' · '+(x.liveUrl?'<a href="'+esc(x.liveUrl)+'" target="_blank">Live 보기</a>':'Private preview 방식')+'</p></div><div class="card strong"><h3>처음 만드는 사람이 이해할 한 문장</h3><p class="lead">'+esc(x.beginnerGoal)+'</p><p>'+esc(x.oneLine)+'</p></div></div>');slide('<span class="kicker">CASE '+n+' · 제작 순서</span><h2 class="title">'+esc(x.title)+' 만드는 순서</h2><div class="grid cols2"><div class="card">'+stepList(x.workflow)+'</div><div class="card"><h3>초보자가 헷갈리는 포인트</h3><p>'+esc(x.teachingPoint)+'</p><h3>결과 파일</h3><p>'+esc((x.outputFiles||[]).join(', '))+'</p></div></div>');slide('<span class="kicker">CASE '+n+' · 어디를 누르나</span><h2 class="title">GitHub에서 클릭하는 순서</h2><div class="grid cols2"><div>'+screenShot(x)+'</div><div class="card">'+stepList(x.clickGuide)+'</div></div>');slide('<span class="kicker">CASE '+n+' · 복붙 프롬프트</span><h2 class="title">Claude에게 이렇게 말합니다</h2><div class="prompt">'+esc(x.claudePrompt)+'</div>');});slide('<span class="kicker">새 결과물 추가법</span><h2 class="title">다음 결과물은 JSON 한 블록만 추가하면 됩니다</h2><div class="grid cols2"><div class="card">'+stepList(['assets/screenshots에 캡처 이미지를 넣는다','data/projects.json을 연다','projects 배열 마지막에 객체 하나를 추가한다','repo, title, kind, workflow, clickGuide, claudePrompt를 채운다','GitHub에 commit하면 덱이 자동 갱신된다'])+'</div><div class="prompt">{ "id": "new-project", "repo": "owner/repo", "title": "새 결과물 제목", "kind": "제작 패턴", "screenshots": [{ "file": "new-project.png" }], "workflow": ["1단계", "2단계"], "clickGuide": ["어디 클릭", "무엇 입력"], "claudePrompt": "Claude에게 입력할 문장" }</div></div>');slide('<span class="kicker">마무리</span><h2 class="title">AI 초보에게 필요한 건 코딩 실력이 아니라<br><span class="lime">요청 순서</span>입니다</h2><div class="grid cols2"><div class="card strong"><h3>강의 핵심</h3><p class="lead">완성 화면을 보고, Claude에게 작은 단위로 시키고, GitHub Pages에서 확인하며 고친다.</p></div><div class="card">'+stepList(['화면 캡처로 설명한다','클릭 위치를 크게 보여준다','프롬프트는 복사 가능하게 준다','새 결과물은 JSON에 누적한다'])+'</div></div>');show(0);}
function show(i){current=Math.max(0,Math.min(i,slides.length-1));slides.forEach(function(s,k){s.classList.toggle('active',k===current);});document.getElementById('count').textContent=(current+1)+' / '+slides.length;location.hash='s'+(current+1);}document.getElementById('prev').onclick=function(){show(current-1)};document.getElementById('next').onclick=function(){show(current+1)};window.onkeydown=function(e){if(e.key==='ArrowRight'||e.key===' '){show(current+1)}if(e.key==='ArrowLeft'){show(current-1)}};
function start(){var m=location.hash.match(/s(d+)/);render();if(m){show(Number(m[1])-1)}}
if(location.protocol==='file:'){start();}else{fetch('data/projects.json').then(function(r){return r.ok?r.json():DATA}).then(function(j){DATA=j;start();}).catch(start)}
</script>
</body>
</html>
